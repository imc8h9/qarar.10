/* ⭐ إرسال رسالة */
async function sendChat(text){
  if(chatBusy) return;                       // منع الرسائل المكررة
  const q = text || $('#chatText')?.value?.trim();
  if(!q) return;

  chatBusy = true;
  const input = $('#chatText');
  if(input){ input.value=''; input.disabled = true; }

  addMsg(q, 'user');

  const typing = addMsg('<span class="dot-pulse"></span> يفكر...', 'ai', 'typing');
  setAgentStatus('يفكر...', true);

  try{
    const out = await QararAgent.processMessage(q, {
      onStage(stage){
        if(!typing) return;
        const map = {
          thinking:  'يفكر...',
          understood:'يجمع البيانات...',
          analyzing: 'يحلّل القرار بالمحرك...',
          awaiting_confirmation:'ينتظر تأكيدك...',
          fallback:  'الوضع الاحتياطي...'
        };
        const t = map[stage];
        if(t){
          typing.innerHTML = `<span class="dot-pulse"></span> ${t}`;
          setAgentStatus(t, true);
        }
      }
    });

    typing?.remove();

    /* تحديث لافتة الوضع */
    showAIModeBanner(QararAgent.getMode()==='ai' ? 'ai' : 'fallback',
                     {missingKey:false});

    if(out.type === 'analysis'){
      addMsg(esc(out.reply), 'ai');
      const e = out.engine;
      addMsg(analysisCard(e.result, e.decision), 'ai', 'wide');
    }
    else if(out.type === 'confirmation'){
      addMsg(esc(out.reply), 'ai');
      addMsg(confirmCard(out.draft), 'ai', 'wide');
    }
    else{
      addMsg(esc(out.reply).replace(/\n/g,'<br>'), 'ai');
    }

  }catch(err){
    typing?.remove();
    addMsg('تعذر تشغيل المساعد. استخدم نموذج «اختبار القرار» للتحليل الكامل.', 'ai');
  }finally{
    chatBusy = false;
    setAgentStatus('جاهز', false);
    if(input){ input.disabled = false; input.focus(); }
  }
}

/* ───────────────────────────────────────────────────────────────────────
 * إعادة الحساب المركزية
 * أي تعديل في البيانات → تُعاد الصفحة الحالية → كل الأرقام تتحدث
 * ─────────────────────────────────────────────────────────────────── */

function refreshCurrentView(){
  const el = $('#view');
  if(!el || !views[currentView]) return;
  el.innerHTML = views[currentView]();
  afterRender(currentView);
}

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ دورة حياة المتجر النشط (Store Lifecycle)
 *
 * 🔴 الخطأ الذي كان قاتلًا:
 *   كان الاشتراك يتم على QararStore عند تحليل السكربت:
 *
 *       QararStore.subscribe(refreshCurrentView);   // ← المتجر «أ»
 *
 *   ثم يأتي prepareDependencies() لاحقًا فيستبدل المتجر:
 *
 *       window.QararStore = QararFallbackStore;     // ← المتجر «ب»
 *
 *   النتيجة: المستخدم يعدّل «ب»، و«ب» يُنادي مشتركيه — لكن قائمته **فارغة**،
 *   لأن الواجهة مشتركة في «أ». فالبيانات تتغير داخليًا **والشاشة لا تتحرك**.
 *
 *   هذا بالضبط سبب: «أضفت مصروفًا والرصيد لم يتغير»
 *                   «عدّلت الكهرباء ولم تُحفظ»
 *
 * ✅ الحل: الاشتراك يتم **بعد** تحديد المتجر النهائي، ويُعاد ربطه عند أي تبديل.
 * ═══════════════════════════════════════════════════════════════════════ */

let activeStoreUnsubscribe = null;   // دالة إلغاء الاشتراك الحالية
let subscribedStore        = null;   // المتجر المشترَك فيه فعلًا

/** ما يحدث عند أي تغيير في الحالة المالية */
function handleFinancialStateChange(){
  lastMutationAt = Date.now();
  refreshCurrentView();
}

/**
 * ⭐ يربط الواجهة بالمتجر النشط الحالي.
 * - يلغي الاشتراك القديم (لا اشتراكات مكررة)
 * - يشترك في المتجر الحالي
 * - آمن للاستدعاء أكثر من مرة
 * - يُستدعى: عند البدء · بعد الاسترداد · عند أي تبديل للمتجر
 */
function bindActiveStore(){
  var current = window.QararStore;

  /* المتجر لم يتغير → لا شيء نفعله */
  if (subscribedStore === current) return false;

  /* فُك الارتباط القديم */
  if (typeof activeStoreUnsubscribe === 'function') {
    try { activeStoreUnsubscribe(); }
    catch(e){ console.error('[Qarar] تعذر إلغاء الاشتراك القديم:', e); }
    activeStoreUnsubscribe = null;
  }

  subscribedStore = current;

  if (!current || typeof current.subscribe !== 'function') {
    console.error('[Qarar] 🔴 لا يوجد متجر نشط — الواجهة لن تتحدث!');
    return false;
  }

  try {
    activeStoreUnsubscribe = current.subscribe(handleFinancialStateChange);
    console.log('[Qarar] ✓ ارتبطت الواجهة بالمتجر: '
                + (current.__isFallback ? 'بديل 🛡' : 'حقيقي ✓'));
    return true;
  } catch(e){
    console.error('[Qarar] تعذر الاشتراك في المتجر:', e);
    return false;
  }
}

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ commitFinancialMutation() — النقطة المركزية الوحيدة لأي تعديل مالي
 *
 * 🔴 لماذا؟ لأن الاعتماد على Subscription وحدها **هشّ**:
 *    لو انقطع الاشتراك (كما حدث)، تتغير البيانات ولا تتحرك الشاشة —
 *    والمستخدم لا يعرف هل حُفظ شيء أم لا.
 *
 * هذه الدالة تضمن — في كل مرة — التسلسل الكامل:
 *   ١. التأكد من ارتباط المتجر الصحيح
 *   ٢. تنفيذ التعديل
 *   ٣. إعادة حساب اللقطة المالية
 *   ٤. إعادة رسم الصفحة الحالية (صراحةً — لا اعتمادًا على الاشتراك)
 *   ٥. رسالة نجاح
 *   ٦. معالجة الخطأ بوضوح
 * ═══════════════════════════════════════════════════════════════════════ */

let lastMutationAt = Date.now();

function commitFinancialMutation(operation, options){
  var opt = options || {};
  var result = null;

  try {
    /* (١) ضمان أن الواجهة مرتبطة بالمتجر الصحيح — قبل أي تعديل */
    bindActiveStore();

    /* (٢) تنفيذ التعديل */
    result = operation();

    /* (٣) إعادة الحساب */
    try {
      if (QararStore.recalculateFinancialSnapshot) {
        QararStore.recalculateFinancialSnapshot();
      }
    } catch(e){ console.error('[Qarar] تعذرت إعادة الحساب:', e); }

    /* (٤) 🔴 إعادة الرسم صراحةً — لا نعتمد على الاشتراك وحده */
    lastMutationAt = Date.now();
    refreshCurrentView();

    /* (٥) رسالة نجاح */
    if (opt.successMessage) {
      toast(typeof opt.successMessage === 'function'
        ? opt.successMessage(result) : opt.successMessage);
    }

    if (opt.onSuccess) opt.onSuccess(result);
    return { ok: true, result: result };

  } catch (err) {
    console.error('[Qarar] فشل التعديل المالي:', err);

    var msg = (err && err.message === 'DUPLICATE_SUBMIT')
      ? 'هذه العملية أُضيفت للتو. تجنّب الضغط مرتين.'
      : (opt.errorMessage || ('تعذر الحفظ: ' + (err.message || 'خطأ غير معروف')));

    if (opt.onError) opt.onError(err, msg);
    else toast(msg);

    return { ok: false, error: err, message: msg };
  }
}

/** حالة التخزين — صريحة، بلا تضليل */
function storageStatus(){
  var fb = !!(window.QararStore && QararStore.__isFallback);
  var persistent = false;
  try { persistent = !fb && QararStore.isPersistent && QararStore.isPersistent(); }
  catch(e){}
  return {
    isFallback:  fb,
    persistent:  persistent,
    label:       persistent ? 'محلي دائم ✓' : (fb ? 'وضع استرداد ⚠️' : 'ذاكرة مؤقتة ⚠️'),
    warning:     persistent ? null
                 : (fb ? 'وضع استرداد — التغييرات مؤقتة ولن تبقى بعد إغلاق الصفحة.'
                       : 'التخزين المحلي معطّل — التغييرات لن تبقى بعد إغلاق الصفحة.')
  };
}

/* ───────────────────────────────────────────────────────────────────────
 * معالج الإجراءات
 * ─────────────────────────────────────────────────────────────────── */

function handleAction(action, el){
  if(action==='startExperience') { startExperience(); return; }
  if(action==='closeSheet') { closeSheet(); return; }

  /* ── محرك القرار ── */
  if(action==='simulateDecision'){
    /* 🔴 التحليل لا يعتمد على setTimeout إطلاقًا.
     *   الأنيميشن تجميلي فقط — والتحليل يعمل حتى لو فشل. */
    runDecisionAnalysis(el);
  }
  if(action==='retryAnalysis') runDecisionAnalysis();
  if(action==='resetFromError'){
    QararStore.reset();
    bindActiveStore();
    toast('أُعيد ضبط البيانات ✓');
    navigate('decision','جارٍ إعادة التحليل...');
  }
  if(action==='applyAlt') applyAlternative(el.dataset.alt);

  if(action==='scenario'){
    $('#decisionName').value      = el.dataset.title;
    $('#decisionAmount').value    = el.dataset.amount;
    $('#decisionType').value      = el.dataset.type;
    $('#decisionEssential').value = el.dataset.essential === 'true' ? 'yes' : 'no';
    toast(`تم اختيار: ${el.dataset.title}`);
    window.scrollTo({top:0, behavior:'smooth'});
  }

  if(action==='saveDecisionPlan'){
    if(!lastAnalysis) return;
    commitFinancialMutation(
      () => QararStore.savePlannedDecision({
        name: $('#decisionName').value,
        type: $('#decisionType').value,
        amount: lastAnalysis.input.decisionAmount,
        targetDate: $('#decisionDate').value,
        isEssential: $('#decisionEssential').value==='yes',
        paymentMode: $('#decisionPayMode').value,
        months: Number($('#decisionMonths')?.value || 0)
      }, lastAnalysis),
      { successMessage: 'حُفظ كقرار مخطط — لم يُخصم من رصيدك ✓' });
  }

  if(action==='proceedAnyway'){
    if(!lastAnalysis) return;
    openSheet(`
      <h3>⚠️ تأكيد المتابعة رغم التحذير</h3>
      <p>مستوى الخطر: <b>${lastAnalysis.riskLevelAr}</b></p>
      <p>سيتبقى لديك <b>${riyal(lastAnalysis.minimumBalance)}</b> عند
         ${DateU.formatArabic(lastAnalysis.minimumBalanceDate)} —
         أقل من حدك الآمن (${riyal(lastAnalysis.safeFloor)}).</p>
      <p>هذا يعني أن القرار سيُنفَّذ ويُخصم من رصيدك فعلًا.</p>
      <div class="hero-actions">
        <button class="btn orange" data-action="confirmExecute">نعم، نفّذ القرار</button>
        <button class="btn outline" data-action="closeSheet">تراجع</button>
      </div>`);
  }

  /* ⭐ تنفيذ القرار → يتحول إلى Transaction (يُخصم مرة واحدة فقط) */
  if(action==='confirmExecute'){
    if(!lastAnalysis) return;
    try{
      const rec = QararStore.savePlannedDecision({
        name: $('#decisionName')?.value || 'قرار',
        type: $('#decisionType')?.value || 'purchase',
        amount: lastAnalysis.input.decisionAmount,
        targetDate: $('#decisionDate')?.value || QararStore.getProfile().asOfDate,
        isEssential: false, paymentMode:'one_time'
      }, lastAnalysis);
      QararStore.executeDecision(rec.id);
      closeSheet();
      toast('نُفّذ القرار — خُصم من رصيدك ✓');
      lastAnalysis = null;
    }catch(e){
      closeSheet();
      toast(e.message==='ALREADY_EXECUTED' ? 'القرار منفّذ مسبقًا' : 'تعذر التنفيذ');
    }
  }

  /* ── Sandbox: إضافة عملية (دخل أو مصروف) ── */
  if(action==='openAddTx'){
    const kind   = el.dataset.kind || 'expense';
    const preset = el.dataset.preset || '';
    const amt    = el.dataset.amount || '';
    openSheet(txForm({kind, title:preset, merchant:preset, amount:amt}));
  }

  if(action==='editTx'){
    const t = QararStore.getTransaction(el.dataset.id);
    if(!t) return;
    openSheet(txForm({
      id: t.id, kind: t.type, title: t.title, merchant: t.merchantOrSource,
      amount: Money.toRiyal(t.amountMinor), date: t.transactionDate,
      category: t.category, notes: t.notes
    }));
  }

  if(action==='saveTx'){
    saveTransactionFromForm();
  }

  if(action==='askDeleteTx'){
    const t = QararStore.getTransaction(el.dataset.id);
    if(!t) return;
    openSheet(`
      <h3>حذف العملية؟</h3>
      <p><b>${esc(t.title)}</b> — ${riyal(t.amountMinor)}
         (${t.type==='income'?'دخل':'مصروف'})</p>
      <p>سيعود الرصيد ونتائج القرار إلى ما كانت عليه.</p>
      <div class="hero-actions">
        <button class="btn orange" data-action="confirmDeleteTx" data-id="${t.id}">تأكيد الحذف</button>
        <button class="btn outline" data-action="closeSheet">إلغاء</button>
      </div>`);
  }

  if(action==='confirmDeleteTx'){
    const id = el.dataset.id;
    commitFinancialMutation(
      () => QararStore.deleteTransaction(id),
      { onSuccess(){
          closeSheet();
          toast(`حُذفت العملية — الرصيد الآن ${riyal(QararStore.getBalance())}`);
      }});
  }

  /* ── الفواتير المتغيرة ── */
  if(action==='editBillForecast'){
    const id = el.dataset.bill;
    const fc = QararStore.getBillForecast(id);
    openSheet(`
      <h3>تعديل القيمة المتوقعة — ${esc(fc.title)}</h3>
      <p class="demo-note">هذه القيمة يستخدمها محرك القرار مباشرة.
         تغييرها سيغيّر نتيجة اختبار القرار فورًا.</p>
      <div class="field">
        <label>القيمة المتوقعة (ريال)</label>
        <input id="billAmt" type="number" min="1" value="${Money.toRiyal(fc.expectedMinor)}"/>
      </div>
      <input type="hidden" id="billId" value="${id}"/>
      <div id="billError" class="tx-error"></div>
      <button class="btn primary" data-action="saveBillForecast">حفظ</button>`);
  }

  if(action==='saveBillForecast'){
    const id  = $('#billId')?.value;
    const amt = Number($('#billAmt')?.value || 0);
    const btn = el;

    if(!amt || amt<=0){
      const e = $('#billError');
      if(e) e.textContent = 'أدخل مبلغًا صحيحًا أكبر من صفر';
      else toast('أدخل مبلغًا صحيحًا');
      return;
    }

    const oldVal = QararStore.getBillForecast(id)?.expectedMinor;
    const title  = QararStore.getBillForecast(id)?.title || 'الفاتورة';

    if(btn){ btn.disabled = true; btn.textContent = 'جارٍ الحفظ...'; }

    /* ⭐ عبر النقطة المركزية */
    commitFinancialMutation(
      () => QararStore.setBillManualForecast(id, Money.fromRiyal(amt)),
      {
        onSuccess(){
          closeSheet();
          toast(`تم تحديث توقع ${esc(title)} من ${riyal(oldVal)} إلى ${riyal(Money.fromRiyal(amt))}`);
        },
        onError(err, msg){
          if(btn){ btn.disabled = false; btn.textContent = 'حفظ'; }
          const e = $('#billError');
          if(e) e.textContent = msg; else toast(msg);
        }
      }
    );
  }

  if(action==='clearManual'){
    commitFinancialMutation(
      () => QararStore.setBillManualForecast(el.dataset.bill, null),
      { successMessage: 'عاد التوقع المحسوب من السجل ✓' });
  }

  if(action==='addBillEntry'){
    const id = el.dataset.bill;
    const fc = QararStore.getBillForecast(id);
    openSheet(`
      <h3>إضافة قراءة شهرية — ${esc(fc.title)}</h3>
      <div class="form-grid">
        <div class="field"><label>الشهر</label>
          <input id="beMonth" type="month" value="2026-07"/></div>
        <div class="field"><label>المبلغ (ريال)</label>
          <input id="beAmt" type="number" min="1" placeholder="مثال: 900"/></div>
      </div>
      <input type="hidden" id="beBill" value="${id}"/>
      <button class="btn primary" data-action="saveBillEntry">حفظ القراءة</button>`);
  }

  if(action==='saveBillEntry'){
    const bid = $('#beBill')?.value;
    const mo  = $('#beMonth')?.value;
    const amt = Number($('#beAmt')?.value || 0);
    if(!mo || !amt || amt<=0){ toast('أكمل الشهر والمبلغ'); return; }
    commitFinancialMutation(
      () => QararStore.addBillEntry({billId:bid, billingPeriod:mo, amountMinor:Money.fromRiyal(amt)}),
      { onSuccess(){ closeSheet(); toast('أُضيفت القراءة — حُدّث التوقع ✓'); } });
  }

  if(action==='editObligation'){
    const o = QararStore.getObligations().find(x=>x.id===el.dataset.id);
    if(!o) return;
    openSheet(`
      <h3>تعديل الالتزام</h3>
      <div class="form-grid">
        <div class="field"><label>الاسم</label>
          <input id="obTitle" value="${esc(o.title)}"/></div>
        <div class="field"><label>المبلغ (ريال)</label>
          <input id="obAmt" type="number" min="1" value="${Money.toRiyal(o.amountMinor)}"/></div>
        <div class="field"><label>تاريخ الاستحقاق</label>
          <input id="obDate" type="date" value="${o.nextDueDate}"/></div>
        <div class="field"><label>الأهمية</label>
          <select id="obEss">
            <option value="essential" ${o.essentiality==='essential'?'selected':''}>أساسي</option>
            <option value="optional" ${o.essentiality==='optional'?'selected':''}>اختياري</option>
          </select></div>
      </div>
      <input type="hidden" id="obId" value="${o.id}"/>
      <button class="btn primary" data-action="saveObligation">حفظ</button>`);
  }

  if(action==='saveObligation'){
    const id  = $('#obId')?.value;
    const amt = Number($('#obAmt')?.value || 0);
    if(!amt || amt<=0){ toast('أدخل مبلغًا صحيحًا'); return; }
    commitFinancialMutation(
      () => QararStore.updateObligation(id, {
        title: $('#obTitle').value,
        amountMinor: Money.fromRiyal(amt),
        nextDueDate: $('#obDate').value,
        essentiality: $('#obEss').value
      }),
      { onSuccess(){ closeSheet(); toast('حُدّث الالتزام — أُعيد الحساب ✓'); } });
  }

  if(action==='addObligation'){
    openSheet(`
      <h3>التزام جديد</h3>
      <div class="form-grid">
        <div class="field"><label>الاسم</label>
          <input id="noTitle" placeholder="مثال: قسط سيارة"/></div>
        <div class="field"><label>المبلغ (ريال)</label>
          <input id="noAmt" type="number" min="1"/></div>
        <div class="field"><label>تاريخ الاستحقاق</label>
          <input id="noDate" type="date" value="${QararStore.getProfile().asOfDate}"/></div>
        <div class="field"><label>الأهمية</label>
          <select id="noEss">
            <option value="essential">أساسي</option>
            <option value="optional">اختياري</option>
          </select></div>
      </div>
      <button class="btn primary" data-action="saveNewObligation">إضافة</button>`);
  }

  if(action==='saveNewObligation'){
    const t = $('#noTitle')?.value?.trim();
    const a = Number($('#noAmt')?.value || 0);
    if(!t || !a || a<=0){ toast('أكمل الاسم والمبلغ'); return; }
    commitFinancialMutation(
      () => QararStore.addObligation({
        title: t, amountMinor: Money.fromRiyal(a),
        nextDueDate: $('#noDate').value,
        essentiality: $('#noEss').value
      }),
      { onSuccess(){ closeSheet(); toast('أُضيف الالتزام — أُعيد الحساب ✓'); } });
  }

  /* ── الإعدادات المالية ── */
  if(action==='editProfile'){
    const p = QararStore.getProfile();
    openSheet(`
      <h3>تعديل الملف المالي</h3>
      <p class="demo-note">كل تغيير هنا يُعيد حساب المحرك في جميع الصفحات.</p>
      <div class="form-grid">
        <div class="field"><label>الرصيد الافتتاحي (ريال)</label>
          <input id="pfBal" type="number" min="0" value="${Money.toRiyal(p.openingBalanceMinor)}"/></div>
        <div class="field"><label>الراتب الشهري (ريال)</label>
          <input id="pfInc" type="number" min="0" value="${Money.toRiyal(p.monthlyIncomeMinor)}"/></div>
        <div class="field"><label>تاريخ الراتب القادم</label>
          <input id="pfDate" type="date" value="${p.salaryDate}"/></div>
        <div class="field"><label>الحد الآمن (ريال)</label>
          <input id="pfSafe" type="number" min="0" value="${Money.toRiyal(p.safeBalanceMinor)}"/></div>
      </div>
      <button class="btn primary" data-action="saveProfile">حفظ</button>`);
  }

  if(action==='saveProfile'){
    commitFinancialMutation(
      () => QararStore.updateProfile({
        openingBalanceMinor: Money.fromRiyal(Number($('#pfBal').value||0)),
        monthlyIncomeMinor:  Money.fromRiyal(Number($('#pfInc').value||0)),
        salaryDate:          $('#pfDate').value,
        safeBalanceMinor:    Money.fromRiyal(Number($('#pfSafe').value||0))
      }),
      { onSuccess(){ closeSheet(); toast('حُدّث الملف المالي — أُعيد الحساب ✓'); },
        errorMessage: 'قيمة غير صالحة' });
  }

  /* ── المزيد (تنقل الجوال) ── */
  if(action==='moreNav'){
    openSheet(`<h3>جميع الأقسام</h3>
      <div class="more-grid">
        ${navItems.map(n=>`
          <button class="more-item" data-goto="${n.id}" data-load="${n.load}">
            <span class="ico">${n.icon}</span><span>${n.title}</span>
          </button>`).join('')}
      </div>`);
  }

  /* ── إعادة الضبط ── */
  if(action==='resetDemo'){
    openSheet(`<h3>إعادة ضبط البيانات التجريبية؟</h3>
      <p>ستعود جميع البيانات إلى سيناريو العرض الأصلي
         (رصيد 4,200 · كهرباء 650 · ماء 180 · إنترنت 300 · حد آمن 1,500).</p>
      <button class="btn orange" data-action="confirmReset">تأكيد إعادة الضبط</button>`);
  }
  if(action==='confirmReset'){
    QararStore.reset();
    closeSheet();
    showLoading('جارٍ إعادة الضبط...');
    setTimeout(()=>{ hideLoading(); navigate('home','جارٍ فتح لوحة قرار...'); toast('تمت إعادة الضبط ✓'); }, 650);
  }

  /* ── أخرى ── */
  if(action==='notifications'){
    const snap = QararStore.getSnapshot();
    openSheet(`<h3>تنبيهات قرار</h3><div class="insight-list">
      ${insight('💰','رصيدك الحالي', riyal(snap.balanceMinor))}
      ${snap.obligations.slice(0,3).map(o=>insight(o.icon, esc(o.name),
        `${riyal(o.amount)} — ${DateU.formatArabic(o.dueDate)}`)).join('')}
    </div>`);
  }
  if(action==='sendChat') sendChat();

  /* ── تأكيد/إلغاء مسودة المساعد ── */
  if(action==='agentConfirm'){
    const res = QararAgent.confirmDraft();
    if(res.ok){
      addMsg(`✓ ${esc(res.message)}`, 'ai', 'success');
      toast('تم الحفظ ✓');
    }else{
      addMsg('تعذر الحفظ: ' + esc(res.error||''), 'ai');
    }
    el.closest('.confirm-card')?.classList.add('done');
  }
  if(action==='agentCancel'){
    QararAgent.cancelDraft();
    addMsg('تم الإلغاء — لم يُحفظ شيء.', 'ai');
    el.closest('.confirm-card')?.classList.add('done');
  }
  if(action==='agentEdit'){
    QararAgent.cancelDraft();
    el.closest('.confirm-card')?.classList.add('done');
    addMsg('تمام — اكتب التعديل، مثل «خله 2200» أو «بعد الراتب».', 'ai');
  }
  if(action==='applyAltChat'){
    const alt = el.dataset.alt;
    const msg = alt==='delay_to_salary' ? 'أجّله إلى ما بعد الراتب'
              : alt==='reduce_amount'   ? 'قلّل المبلغ إلى الحد الآمن'
              : alt==='convert_to_goal' ? 'حوّله إلى هدف ادخار'
              : alt==='cancel'          ? 'ألغِ القرار'
              : 'وش أفضل موعد؟';
    sendChat(msg);
  }
  if(action==='toggle') el.classList.toggle('on');
  if(action==='savePermissions') toast('حُفظت إعدادات المشاركة');
  if(action==='exportReport') toast('التقارير المتقدمة قيد التطوير');
  if(action==='reminder') toast('التذكيرات قيد التطوير');

  /* أزرار كانت معطّلة (لا معالج) — اكتشفها فحص السلامة */
  if(action==='statusPlan'){
    navigate('decision','جارٍ فتح محرك القرار...');
  }
  if(action==='editFamily'){
    navigate('settings','جارٍ فتح الإعدادات...');
    toast('عدّل ملفك المالي من هنا');
  }
}

/* ───────────────────────────────────────────────────────────────────────
 * نموذج العملية (دخل / مصروف)
 * ─────────────────────────────────────────────────────────────────── */

function txForm(o){
  const isEdit = !!o.id;
  const kind   = o.kind || 'expense';
  const bal    = QararStore.getBalance();
  return `
    <h3>${isEdit ? 'تعديل العملية' : 'عملية جديدة'}</h3>
    <p class="demo-note">بيئة تجريبية — لا توجد بيانات مصرفية حقيقية.</p>

    <div class="field">
      <label>نوع العملية</label>
      <div class="type-toggle">
        <button type="button" class="type-opt income ${kind==='income'?'active':''}"
                data-action="setTxType" data-type="income">
          <b>＋ دخل</b><small>يزيد الرصيد</small>
        </button>
        <button type="button" class="type-opt expense ${kind==='expense'?'active':''}"
                data-action="setTxType" data-type="expense">
          <b>− مصروف</b><small>ينقص الرصيد</small>
        </button>
      </div>
    </div>

    <div class="form-grid">
      <div class="field"><label>العنوان</label>
        <input id="txTitle" value="${esc(o.title||'')}" placeholder="مثال: بقالة"/></div>
      <div class="field"><label>التاجر / المصدر</label>
        <input id="txMerchant" value="${esc(o.merchant||'')}" placeholder="مثال: Panda"/></div>
      <div class="field"><label>المبلغ (ريال)</label>
        <input id="txAmount" type="number" step="0.01" value="${o.amount||''}" placeholder="مثال: 200"/>
        <small class="hint">اكتب رقمًا موجبًا. النوع أعلاه يحدد الإشارة.</small></div>
      <div class="field"><label>التاريخ</label>
        <input id="txDate" type="date" value="${o.date||QararStore.getProfile().asOfDate}"/></div>
      <div class="field"><label>التصنيف</label>
        <select id="txCategory">
          ${QararDemo.CATEGORIES.map(c=>
            `<option ${o.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="field"><label>ملاحظات (اختياري)</label>
        <input id="txNotes" value="${esc(o.notes||'')}"/></div>
    </div>

    <input type="hidden" id="txType" value="${kind}"/>
    <input type="hidden" id="txId" value="${o.id||''}"/>

    <div class="bal-preview">
      <span>الرصيد قبل: <b>${riyal(bal)}</b></span>
      <span id="balAfter" class="bal-after"></span>
    </div>

    <div id="txError" class="tx-error"></div>
    <button class="btn primary" data-action="saveTx" id="saveTxBtn">
      ${isEdit ? 'حفظ التعديل' : 'حفظ العملية'}
    </button>`;
}

/** تحديث معاينة الرصيد بعد العملية */
function updateBalPreview(){
  const amt  = Number($('#txAmount')?.value || 0);
  const type = $('#txType')?.value || 'expense';
  const el   = $('#balAfter');
  const errEl= $('#txError');
  if(!el) return;

  if(errEl) errEl.textContent = '';

  if(!amt || amt<=0){ el.textContent=''; return; }

  const editId = $('#txId')?.value;
  let bal = QararStore.getBalance();
  /* لو تعديل: نلغِ أثر العملية القديمة أولًا */
  if(editId){
    const old = QararStore.getTransaction(editId);
    if(old) bal += (old.type==='income' ? -old.amountMinor : old.amountMinor);
  }
  const delta = Money.fromRiyal(amt);
  const after = type==='income' ? bal + delta : bal - delta;

  el.innerHTML = `الرصيد بعد: <b class="${after<0?'neg':''}">${riyal(after)}</b>`;
}

/** حفظ العملية مع Validation واضح */
function saveTransactionFromForm(){
  const btn = $('#saveTxBtn');
  const errEl = $('#txError');
  const title = $('#txTitle')?.value?.trim();
  const raw   = $('#txAmount')?.value?.trim();
  const type  = $('#txType')?.value;
  const editId= $('#txId')?.value;

  const showErr = (m)=>{ if(errEl) errEl.textContent = m; else toast(m); };

  if(!title){ showErr('أدخل عنوان العملية'); return; }
  if(!raw){   showErr('أدخل المبلغ'); return; }

  const num = Number(raw);
  if(!isFinite(num) || num===0){ showErr('أدخل مبلغًا صحيحًا'); return; }

  /* 🔴 تعارض الإشارة مع النوع — لا نسمح بتعارض صامت */
  const wroteNegative = raw.startsWith('-') || num < 0;
  const wrotePositive = raw.startsWith('+');

  if(wroteNegative && type==='income'){
    showErr('اخترت «دخل» لكن كتبت مبلغًا سالبًا. غيّر النوع إلى «مصروف» أو اكتب رقمًا موجبًا.');
    return;
  }
  if(wrotePositive && type==='expense'){
    showErr('اخترت «مصروف» لكن كتبت علامة (+). غيّر النوع إلى «دخل» أو احذف العلامة.');
    return;
  }

  const amountMinor = Money.fromRiyal(Math.abs(num));

  /* منع الضغط المزدوج */
  if(btn){ btn.disabled = true; btn.textContent = 'جارٍ الحفظ...'; }

  const payload = {
    type, amountMinor, title,
    merchantOrSource: $('#txMerchant')?.value?.trim() || title,
    category:  $('#txCategory')?.value,
    transactionDate: $('#txDate')?.value || QararStore.getProfile().asOfDate,
    notes:     $('#txNotes')?.value?.trim() || '',
    source:    'sandbox'
  };

  /* ⭐ كل تعديل يمر من النقطة المركزية — تضمن: حفظ + إعادة حساب + إعادة رسم */
  const out = commitFinancialMutation(
    () => editId
      ? QararStore.updateTransaction(editId, payload)
      : QararStore.addTransaction(payload),
    {
      onSuccess(){
        closeSheet();
        const bal = QararStore.getBalance();
        toast(editId
          ? `حُدّثت العملية — الرصيد الآن ${riyal(bal)}`
          : (type==='income'
              ? `تمت إضافة الدخل. الرصيد الجديد: ${riyal(bal)}`
              : `تمت إضافة المصروف. الرصيد الجديد: ${riyal(bal)}`));
      },
      onError(err, msg){
        if(btn){ btn.disabled = false; btn.textContent = 'حفظ العملية'; }
        showErr(msg);
      }
    }
  );

  return out;
}

document.addEventListener('click', e => {
  const goto = e.target.closest('[data-goto]');
  if(goto) return navigate(goto.dataset.goto, goto.dataset.load);
  const action = e.target.closest('[data-action]');
  if(action) return handleAction(action.dataset.action, action);
  const ask = e.target.closest('[data-ask]');
  if(ask) return sendChat(ask.dataset.ask);
});
document.addEventListener('change', e=>{
  if(e.target?.id === 'decisionPayMode'){
    const mf = document.getElementById('monthsField');
    if(mf) mf.style.display = e.target.value === 'installment' ? 'grid' : 'none';
  }
  if(e.target?.id === 'txAmount' || e.target?.id === 'txType'){
    updateBalPreview();
  }
});

/* معاينة حيّة للرصيد أثناء الكتابة */
document.addEventListener('input', e=>{
  if(e.target?.id === 'txAmount') updateBalPreview();
});

/* مبدّل نوع العملية (دخل / مصروف) */
document.addEventListener('click', e=>{
  const opt = e.target.closest('[data-action="setTxType"]');
  if(!opt) return;
  e.preventDefault();
  const type = opt.dataset.type;
  const hidden = document.getElementById('txType');
  if(hidden) hidden.value = type;
  document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('active'));
  opt.classList.add('active');
  updateBalPreview();
});

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.activeElement?.id==='chatText') sendChat();
  if(e.key==='Escape') closeSheet();
});

/* ═══════════════════════════════════════════════════════════════════════
 * التمهيد (Bootstrap)
 *
 * 🔴 يجهّز الاعتمادات أولًا (مع البديل عند الحاجة)، ثم يرسم التطبيق كاملًا.
 *    لا يترك #loading ظاهرة أبدًا.
 * ═══════════════════════════════════════════════════════════════════════ */

/* (١) ضمان إخفاء شاشة التحميل */
try{
  var _ld = document.getElementById('loading');
  if(_ld){ _ld.classList.add('hide'); _ld.style.display = 'none'; }
}catch(e){}

/* (٢) ⭐ تجهيز الاعتمادات — قبل أي رسم */
try{ prepareDependencies(); }
catch(e){ console.error('[Qarar] فشل تجهيز الاعتمادات عند التمهيد:', e); }

/* (٢.٥) ⭐ ربط الواجهة بالمتجر النهائي — بعد اختياره */
try{ bindActiveStore(); }
catch(e){ console.error('[Qarar] فشل ربط المتجر عند التمهيد:', e); }

/* (٣) رسم القائمة ولوحة التحكم */
try{ renderNav(); }
catch(err){ console.error('[Qarar] فشل رسم القائمة:', err); }

try{
  document.getElementById('view').innerHTML = views.home();
}catch(err){
  console.error('[Qarar] فشل رسم لوحة التحكم عند التمهيد:', err);
  /* محاولة أخيرة بالمتجر البديل */
  try{
    if (typeof QararFallbackStore !== 'undefined'){
      window.QararStore = QararFallbackStore;
      bindActiveStore();                   // ⭐ أعد الربط
      document.getElementById('view').innerHTML = views.home();
      console.warn('[Qarar] 🛡 رُسمت لوحة التحكم بالمتجر البديل.');
    }
  }catch(e2){ console.error('[Qarar] فشلت المحاولة الأخيرة:', e2); }
}

/* (٤) 🔍 كشف الفتح من داخل ZIP / مجلد مؤقت */
(function detectZipPreview(){
  try{
    var href = String(location.href || '');
    var isTemp = /\/AppData\/Local\/Temp\//i.test(href)
              || /[\\\/]Temp[\\\/].*\.zip/i.test(href)
              || /\.zip[\\\/]/i.test(href);

    if(!isTemp) return;

    console.warn('[Qarar] ⚠️ يبدو أن الملف مفتوح من داخل ZIP أو مجلد مؤقت.');

    var sp = document.getElementById('splash');
    if(!sp) return;
    var card = sp.querySelector('.splash-card') || sp;

    var w = document.createElement('div');
    w.style.cssText = 'margin-top:16px;padding:14px 16px;border-radius:16px;'
      + 'background:rgba(255,122,89,.18);border:1px solid rgba(255,122,89,.55);'
      + 'color:#fff;font-weight:700;font-size:13.5px;line-height:1.8;'
      + 'max-width:480px;margin-inline:auto;text-align:center;position:relative;z-index:2';
    w.innerHTML = '⚠️ <b>يبدو أنك فتحت المنصة من داخل ملف ZIP.</b><br>'
      + 'فُكّ ضغط الملف كاملًا (<b>Extract All</b>) ثم افتح '
      + '<code style="background:rgba(0,0,0,.25);padding:2px 6px;border-radius:6px">index.html</code> '
      + 'من المجلد المستخرج.<br>'
      + '<span style="opacity:.85;font-weight:600">وإلا قد لا تُحمَّل بعض الملفات.</span>';
    card.appendChild(w);
  }catch(e){}
})();

/* (٥) تشخيص ذاتي */
(function selfCheck(){
  var required = ['startExperience','enterAppSafely','prepareDependencies',
                  'navigate','handleAction','runDecisionAnalysis','sendChat'];
  var missing  = required.filter(function(fn){ return typeof window[fn] !== 'function'; });

  var loadingUp = false, dashLen = 0;
  try{
    var l = document.getElementById('loading');
    loadingUp = !!l && !l.classList.contains('hide');
    dashLen = (document.getElementById('view').innerHTML || '').length;
  }catch(e){}

  if(missing.length) console.error('[Qarar] 🔴 دوال مفقودة:', missing);
  if(loadingUp){
    console.error('[Qarar] 🔴 شاشة التحميل ظاهرة — تصحيح قسري.');
    try{
      var l2 = document.getElementById('loading');
      l2.classList.add('hide'); l2.style.display = 'none';
    }catch(e){}
  }

  var store = (typeof QararStore !== 'undefined')
    ? (QararStore.__isFallback ? 'بديل 🛡' : 'حقيقي ✓') : '🔴 مفقود';

  console.log('[Qarar] ✓ جاهز | المتجر: ' + store
    + ' | لوحة التحكم: ' + dashLen + ' حرف'
    + ' | loading: ' + (loadingUp ? '🔴 ظاهرة' : '✓ مخفية')
    + ' | دوال مفقودة: ' + missing.length);
})();
