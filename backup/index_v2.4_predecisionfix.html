/* Qarar logo integration update */
.qarar-appicon{
  padding:0 !important;
  overflow:hidden;
  background:transparent !important;
  border:0 !important;
  box-shadow:0 24px 70px rgba(0,0,0,.48) !important;
}
.qarar-appicon.large{
  width:170px !important;
  height:170px !important;
  border-radius:42px !important;
}
.qarar-appicon.small{
  width:74px !important;
  height:74px !important;
  border-radius:22px !important;
}
.brand-logo-img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 18px 28px rgba(0,0,0,.28));
}
.qarar-mark{
  background-image:url("assets/logo.png") !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  color:transparent !important;
  overflow:hidden;
}
.qarar-mark svg{
  opacity:0 !important;
}
.brand-button .qarar-mark,
.qarar-mark.navmark{
  width:58px !important;
  height:58px !important;
  border-radius:18px !important;
  box-shadow:0 14px 32px rgba(0,0,0,.20), inset 0 0 0 1px rgba(255,255,255,.45) !important;
}
.brand-partnership{
  gap:16px !important;
}
.brand-partnership .brand-title{
  font-size:34px;
}
.brand-partnership .alinma-name{
  font-size:30px;
}
.brand-partnership.compact .brand-title,
.brand-partnership.compact .alinma-name{
  font-size:22px;
}
.brand-x{
  color:#FF9A45;
  font-weight:900;
  text-shadow:0 0 18px rgba(255,154,69,.32);
}
.alinma-mark{
  width:38px;
  height:38px;
  border-radius:9px;
  background:linear-gradient(145deg,#7A241D,#4E130F);
  box-shadow:0 14px 28px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.16);
}
.alinma-mark i{
  width:9px;
  height:25px;
  border-radius:2px;
}
.loading-top-branding .brand-partnership{
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.10);
  padding:10px 14px;
  border-radius:22px;
}
@media (max-width:620px){
  .qarar-appicon.large{
    width:140px !important;
    height:140px !important;
    border-radius:34px !important;
  }
  .qarar-appicon.small{
    width:66px !important;
    height:66px !important;
  }
  .brand-partnership .brand-title,
  .brand-partnership .alinma-name{
    font-size:22px !important;
  }
  .brand-partnership.compact .brand-title,
  .brand-partnership.compact .alinma-name{
    font-size:16px !important;
  }
  .alinma-mark{
    width:30px;
    height:30px;
  }
  .alinma-mark i{
    width:7px;
    height:20px;
  }
}


/* Start gate update: user must choose to enter before platform opens */
.app-shell.prelaunch{
  opacity:0;
  transform:scale(.985);
  filter:blur(10px);
  pointer-events:none;
}
.app-shell{
  transition:opacity .65s var(--ease), transform .65s var(--ease), filter .65s var(--ease);
}
.brand-splash-screen{
  justify-content:center !important;
  padding-top:34px !important;
}
.brand-splash-screen .qarar-appicon.large{
  margin-bottom:24px;
  animation:logoFloat 4.2s var(--ease) infinite alternate;
}
@keyframes logoFloat{
  from{transform:translateY(0) scale(1)}
  to{transform:translateY(-8px) scale(1.015)}
}
.start-experience-btn{
  position:relative;
  z-index:2;
  margin-top:22px;
  min-height:58px;
  padding:0 22px 0 16px;
  border-radius:22px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  color:#fff;
  font-weight:900;
  font-size:17px;
  background:linear-gradient(135deg,#6D5DFB 0%,#8E7CFF 55%,#FF9A45 130%);
  box-shadow:0 18px 42px rgba(109,93,251,.32), inset 0 1px 0 rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.16);
  transition:transform .22s var(--ease), box-shadow .22s var(--ease), opacity .22s var(--ease);
}
.start-experience-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 24px 54px rgba(109,93,251,.42), inset 0 1px 0 rgba(255,255,255,.26);
}
.start-experience-btn:active{transform:translateY(0) scale(.97)}
.start-experience-btn i{
  width:34px;
  height:34px;
  border-radius:13px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.18);
  font-style:normal;
}
.start-experience-btn:disabled{
  opacity:.72;
  cursor:default;
  transform:none;
}
#splash .splash-progress{
  opacity:0;
  transform:translateY(8px);
  transition:opacity .35s var(--ease), transform .35s var(--ease);
  max-width:340px;
}
#splash.starting .splash-progress{
  opacity:1;
  transform:translateY(0);
}
#splash.starting .start-experience-btn{
  opacity:0;
  transform:translateY(8px) scale(.98);
  pointer-events:none;
}
#splash.starting .splash-loading-text{
  color:#F4D8BA;
}
.splash-loading-text{
  max-width:390px;
  line-height:1.8;
  margin-left:auto !important;
  margin-right:auto !important;
}
@media (max-width:620px){
  .start-experience-btn{
    min-height:54px;
    width:100%;
    justify-content:center;
    max-width:310px;
  }
  .splash-loading-text{font-size:15px !important;}
}


/* ═══════════════════════════════════════════════════════════════════
 * أنماط جديدة — محرك القرار، Sandbox، البانرات
 * (تستخدم نفس متغيرات الألوان الأصلية — لا تغيير في الهوية)
 * ═══════════════════════════════════════════════════════════════════ */

/* بانر البيئة التجريبية */
.demo-banner{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:20px;
  background:linear-gradient(135deg,rgba(244,162,97,.14),rgba(255,122,89,.10));
  border:1px solid rgba(244,162,97,.35);margin-bottom:16px}
.demo-banner .demo-ico{font-size:20px;flex:0 0 auto}
.demo-banner b{display:block;color:#8A4B22;font-size:14px;margin-bottom:3px}
.demo-banner span{color:var(--muted);font-size:13px;font-weight:600;line-height:1.6}
.demo-note{padding:10px 12px;border-radius:14px;background:rgba(244,162,97,.12);
  color:#8A4B22;font-weight:700;font-size:13px;margin-bottom:12px}

/* لافتة نتيجة القرار */
.result-banner{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:24px;
  background:#fff;box-shadow:var(--shadow2);margin-bottom:6px}
.result-banner h3{font-size:24px;color:var(--ink);letter-spacing:-.5px}
.result-banner p{color:var(--muted);font-weight:600}

/* ملاحظة المحرك */
.engine-note{margin-top:18px;padding:12px 14px;border-radius:16px;
  background:rgba(39,199,168,.10);border:1px solid rgba(39,199,168,.25);
  color:#11806E;font-weight:700;font-size:13px;line-height:1.7}
.engine-note-dark{margin-top:16px;padding:12px 14px;border-radius:16px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.82);font-weight:700;font-size:13px;line-height:1.7}
.engine-steps{display:grid;gap:10px;margin-top:14px}
.engine-steps .insight{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.engine-steps .insight b{color:#fff}
.engine-steps .insight span{color:rgba(255,255,255,.68)}
.engine-steps .bubble{background:rgba(255,255,255,.14);color:#fff}

/* بطاقات البدائل */
.alt-card{text-align:right;transition:.25s var(--ease)}
.alt-card:hover{transform:translateY(-3px);border-color:rgba(109,93,251,.35)}
.alt-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alt-ico{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
  background:rgba(109,93,251,.10);font-size:19px;flex:0 0 auto}
.alt-card p{font-size:14px;line-height:1.65;margin:0 0 10px}

/* بطاقات السيناريوهات */
.scenario-card{text-align:center;transition:.25s var(--ease)}
.scenario-card:hover{transform:translateY(-4px)}
.scenario-ico{display:block;font-size:34px;margin-bottom:8px}
.scenario-card h4{margin:0 0 4px;font-size:16px}
.scenario-card p{margin:0;font-weight:800;color:var(--violet)}

/* بطاقة قرار (Sandbox) */
.qarar-card{background:linear-gradient(145deg,#111A35,#263B68);color:#fff;
  border-color:rgba(255,255,255,.10);min-height:250px;display:flex;flex-direction:column}
.qcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.qcard-brand{font-weight:900;font-size:15px}
.qcard-mode{font-size:11px;font-weight:900;letter-spacing:1.5px;padding:5px 10px;
  border-radius:999px;background:rgba(244,162,97,.22);color:var(--amber);
  border:1px solid rgba(244,162,97,.4)}
.qcard-balance{margin-bottom:auto}
.qcard-balance span{display:block;color:rgba(255,255,255,.60);font-weight:700;font-size:14px}
.qcard-balance b{font-size:40px;letter-spacing:-1.5px;display:block;margin-top:4px}
.qcard-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0 14px}
.qcard-meta small{display:block;color:rgba(255,255,255,.55);font-weight:700;font-size:12px}
.qcard-meta b{font-size:16px}
.qcard-num{font-family:monospace;letter-spacing:3px;color:rgba(255,255,255,.45);font-size:15px}

/* العمليات السريعة */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.quick{padding:12px 8px;border-radius:16px;background:#fff;border:1px solid rgba(20,33,61,.08);
  font-weight:800;font-size:13px;transition:.22s var(--ease)}
.quick:hover{transform:translateY(-2px);border-color:rgba(109,93,251,.35);
  box-shadow:0 12px 24px rgba(16,23,42,.08)}

/* صفوف العمليات */
.tx-row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:18px;
  background:rgba(255,255,255,.72);border:1px solid rgba(20,33,61,.06);margin-bottom:8px}
.tx-ico{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;
  background:var(--sand);font-size:19px;flex:0 0 auto}
.tx-main{flex:1;min-width:0}
.tx-main b{display:block;color:var(--ink);font-size:15px}
.tx-main span{color:var(--muted);font-weight:600;font-size:12.5px}
.tx-amt{font-weight:900;font-size:16px;white-space:nowrap}
.tx-amt.income{color:#11806E}
.tx-amt.expense{color:#C85435}
.tx-del{width:30px;height:30px;border-radius:10px;background:rgba(20,33,61,.05);
  color:var(--muted);font-size:17px;flex:0 0 auto}
.tx-del:hover{background:rgba(255,122,89,.15);color:#C85435}

/* بطاقات الالتزامات */
.obligation-card{text-align:center}
.ob-ico{display:block;font-size:30px;margin-bottom:6px}
.obligation-card h4{margin:0 0 6px;font-size:15px}

  <script>
  /* ═══════════════════════════════════════════════════════════════════
   * 🛡 شبكة أمان مستقلة تمامًا (Bare Failsafe)
   *
   * هذا السكربت يعمل *قبل* أي ملف خارجي، ولا يعتمد على أي شيء.
   *
   * لماذا؟ لو فشل تحميل أي ملف (src/*.js) — لسبب في الشبكة أو القرص أو
   * قيود المتصفح — فلن يُعرَّف startExperience() إطلاقًا، وسيبقى المستخدم
   * عالقًا للأبد. هذا السكربت يضمن أن الزر يعمل *في كل الأحوال*.
   *
   * التطبيق الكامل سيتجاوزه لاحقًا إن حُمّل بنجاح.
   * ═══════════════════════════════════════════════════════════════════ */
  (function(){
    'use strict';

    /* الدخول القسري — آخر خط دفاع.
     * ⭐ يحاول رسم لوحة التحكم الكاملة أولًا (عبر المتجر البديل المضمّن)،
     *   ولا يكتفي بإزالة الطبقات. */
    function bareEnter(why){
      if (window.__qararEntered) return;
      window.__qararEntered = true;

      /* (١) محاولة رسم التطبيق الكامل — حتى هنا */
      var drew = false;
      try{
        if (typeof window.QararFallbackStore !== 'undefined' &&
            typeof window.views !== 'undefined' && window.views.home){
          window.QararStore = window.QararStore || window.QararFallbackStore;
          if (typeof window.renderNav === 'function') window.renderNav();
          var v = document.getElementById('view');
          v.innerHTML = window.views.home();
          drew = v.innerHTML.length > 500;
          console.warn('[Qarar] 🛡 رُسمت لوحة التحكم بالمتجر البديل.');
        }
      }catch(e){ console.error('[Qarar] تعذر الرسم في شبكة الأمان:', e); }

      /* (٢) إزالة الطبقات */
      try{
        var s = document.getElementById('splash');
        if(s){ s.className = 'splash hide'; s.style.display = 'none'; }
      }catch(e){}
      try{
        var l = document.getElementById('loading');
        if(l){ l.className = 'loading hide'; l.style.display = 'none'; }
      }catch(e){}
      try{
        var a = document.querySelector('.app-shell');
        if(a) a.classList.remove('prelaunch');
      }catch(e){}

      /* (٣) لو تعذر الرسم تمامًا — رسالة صريحة عن سبب المشكلة */
      if(!drew){
        try{
          var vv = document.getElementById('view');
          if(vv && vv.innerHTML.length < 200){
            vv.innerHTML = '<div class="card"><h4>تعذر تحميل ملفات المنصة</h4>'
              + '<p><b>تأكد أنك فككتَ ضغط الملف كاملًا (Extract All)</b> ثم افتح '
              + '<code>index.html</code> من المجلد المستخرج — لا من داخل الـZIP.</p></div>';
          }
        }catch(e){}
      }

      console.warn('[Qarar] 🛡 شبكة الأمان المستقلة | السبب: ' + why
                   + ' | لوحة التحكم: ' + (drew ? '✓ رُسمت' : '✗'));
    }

    window.__bareEnter = bareEnter;

    /* الزر يعمل حتى لو لم يُحمّل أي ملف خارجي */
    document.addEventListener('DOMContentLoaded', function(){
      var btn = document.querySelector('.start-experience-btn');
      if(!btn) return;

      btn.addEventListener('click', function(){
        window.__startClicked = true;

        /* لو التطبيق الكامل جاهز → دعه يتولى الأمر (تجربة كاملة بالأنيميشن) */
        if (typeof window.startExperience === 'function') return;

        /* 🔴 التطبيق لم يُحمَّل — ندخل قسرًا بدل ترك المستخدم عالقًا */
        console.error('[Qarar] 🔴 التطبيق لم يُحمَّل — دخول بالحد الأدنى.');
        bareEnter('scripts_failed');
      });
    });

    /* 🐕 حارس مستقل: لو ضُغط الزر ولم يدخل خلال 3 ثوانٍ → دخول قسري.
       يعمل حتى لو تعطّل الـWatchdog الرئيسي. */
    var bareTimer = setInterval(function(){
      if (window.__qararEntered){ clearInterval(bareTimer); return; }
      if (window.__startClicked){
        if (!window.__bareDeadline) {
          window.__bareDeadline = Date.now() + 1500;
        } else if (Date.now() > window.__bareDeadline){
          bareEnter('bare_watchdog');
        }
      }
    }, 250);
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════════════
       🛡 المتجر البديل — مضمّن داخل HTML (لا يمكن أن يفشل تحميله)
       يُستخدم *فقط* لو فشل تحميل data-store.js الحقيقي.
       يضمن أن لوحة التحكم تُعرض كاملة في كل الأحوال.
       ═══════════════════════════════════════════════════════════════════ -->
  <script>
/* ============================================================================
 * QARAR — FALLBACK STORE  (شبكة أمان البيانات)
 * ============================================================================
 *
 * الغرض الوحيد: **ألا تختفي المنصة أبدًا** لو فشل تحميل ملف بيانات.
 *
 * ما حدث سابقًا:
 *   فشل تحميل ملف واحد (`data-store.js`) ⇒ `QararStore` غير معرّف
 *   ⇒ `views.home()` ينهار ⇒ المستخدم يرى «تعذر تحميل لوحة التحكم»
 *   بدل المنصة الكاملة. هذا غير مقبول.
 *
 * الحل: متجر بديل **مضمّن داخل index.html نفسه** (لا ملف خارجي يمكن أن يفشل)،
 *       يقدّم **نفس الواجهة تمامًا** التي تتوقعها الصفحات.
 *
 * 🔴 قواعد صارمة:
 *   1. لا يعتمد على أي ملف خارجي إطلاقًا (ولا حتى decision-engine).
 *   2. لا يستخدم localStorage (يعمل في الذاكرة — لهذا هو «بديل»).
 *   3. يحمل **نفس بيانات العرض** (4,200 · 650 · 180 · 300 · 1,500).
 *   4. يُستخدم *فقط* عند فشل المتجر الحقيقي — وإلا فالمتجر الحقيقي هو الأصل.
 *
 * النتيجة: **لوحة التحكم تُعرض كاملة في كل الأحوال.**
 * ========================================================================= */

(function (global) {
  'use strict';

  var M = function (r) { return Math.round(r * 100); };   // ريال → هللة

  var TODAY = '2026-07-12';

  function daysFrom(n) {
    var p = TODAY.split('-').map(Number);
    var d = new Date(Date.UTC(p[0], p[1] - 1, p[2]) + n * 86400000);
    return d.getUTCFullYear() + '-' +
           String(d.getUTCMonth() + 1).padStart(2, '0') + '-' +
           String(d.getUTCDate()).padStart(2, '0');
  }

  /* ─── الحالة (في الذاكرة فقط) ─── */

  function freshState() {
    return {
      profile: {
        name:                'أحمد',
        openingBalanceMinor: M(4200),
        monthlyIncomeMinor:  M(12500),
        salaryDate:          daysFrom(6),
        safeBalanceMinor:    M(1500),
        currency:            'SAR',
        timezone:            'Asia/Riyadh',
        asOfDate:            TODAY
      },
      transactions: [],
      obligations: [
        { id:'ob_internet', title:'اشتراك الإنترنت', amountMinor:M(300),
          frequency:'monthly', nextDueDate:daysFrom(5), essentiality:'essential',
          category:'اشتراكات', icon:'🌐', active:true, settled:false }
      ],
      variableBills: [
        { id:'vb_electricity', title:'فاتورة الكهرباء', category:'فواتير',
          usualDueDate:daysFrom(3), essentiality:'essential', icon:'⚡',
          active:true, settled:false, defaultAmountMinor:M(650),
          manualForecastMinor:M(650) },
        { id:'vb_water', title:'فاتورة الماء', category:'فواتير',
          usualDueDate:daysFrom(4), essentiality:'essential', icon:'💧',
          active:true, settled:false, defaultAmountMinor:M(180),
          manualForecastMinor:M(180) }
      ],
      billHistory: [
        { id:'h1', billId:'vb_electricity', billingPeriod:'2026-03', amountMinor:M(520) },
        { id:'h2', billId:'vb_electricity', billingPeriod:'2026-04', amountMinor:M(610) },
        { id:'h3', billId:'vb_electricity', billingPeriod:'2026-05', amountMinor:M(730) },
        { id:'h4', billId:'vb_electricity', billingPeriod:'2026-06', amountMinor:M(680) },
        { id:'h5', billId:'vb_water', billingPeriod:'2026-05', amountMinor:M(190) },
        { id:'h6', billId:'vb_water', billingPeriod:'2026-06', amountMinor:M(180) }
      ],
      plannedDecisions: [],
      savingsGoals:     [],
      merchantRules: { 'panda':'بقالة', 'بندة':'بقالة', 'مطعم':'مطاعم',
                       'netflix':'اشتراكات', 'بنزين':'تنقل' }
    };
  }

  var state = freshState();
  var subs  = [];
  var seq   = 0;

  function uid(p) { return p + '_fb_' + (++seq); }

  function balance() {
    var b = state.profile.openingBalanceMinor;
    state.transactions.forEach(function (t) {
      b += (t.type === 'income' ? t.amountMinor : -t.amountMinor);
    });
    return b;
  }

  function forecast(billId) {
    var bill = state.variableBills.filter(function (b) { return b.id === billId; })[0];
    if (!bill) return null;

    var entries = state.billHistory
      .filter(function (h) { return h.billId === billId; })
      .sort(function (a, b) { return a.billingPeriod.localeCompare(b.billingPeriod); });

    if (bill.manualForecastMinor != null) {
      return {
        billId: billId, title: bill.title,
        expectedMinor: bill.manualForecastMinor,
        isManual: true, confidence: 'manual', confidenceAr: 'تعديل يدوي',
        note: 'قيمة أدخلتها بنفسك.',
        rangeLowMinor: bill.manualForecastMinor,
        rangeHighMinor: bill.manualForecastMinor,
        history: entries, entryCount: entries.length
      };
    }

    var a = entries.map(function (e) { return e.amountMinor; });
    var n = a.length;
    if (!n) {
      return { billId: billId, title: bill.title,
        expectedMinor: bill.defaultAmountMinor || 0, isManual: false,
        confidence: 'none', confidenceAr: 'لا توجد بيانات',
        note: 'البيانات غير كافية لتوقع عالي الثقة.',
        rangeLowMinor: bill.defaultAmountMinor || 0,
        rangeHighMinor: bill.defaultAmountMinor || 0,
        history: [], entryCount: 0 };
    }

    var sum = a.reduce(function (x, y) { return x + y; }, 0);
    var avg = Math.round(sum / n);
    var srt = a.slice().sort(function (x, y) { return x - y; });
    var med = n % 2 ? srt[(n - 1) / 2] : Math.round((srt[n/2 - 1] + srt[n/2]) / 2);

    var ws = 0, wt = 0;
    a.forEach(function (v, i) { ws += v * (i + 1); wt += (i + 1); });
    var weighted = Math.round(ws / wt);

    var trend = 'stable', trendAr = 'مستقر';
    if (n >= 2) {
      var ch = (a[n-1] - a[0]) / (a[0] || 1);
      if (ch >  0.10) { trend = 'rising';  trendAr = 'تصاعدي'; }
      if (ch < -0.10) { trend = 'falling'; trendAr = 'تنازلي'; }
    }

    var conf, confAr, note;
    if (n < 3)      { conf='low';    confAr='منخفضة'; note='البيانات غير كافية لتوقع عالي الثقة.'; }
    else if (n < 5) { conf='medium'; confAr='متوسطة'; note='توقع تقريبي مبني على ' + n + ' قراءات.'; }
    else            { conf='good';   confAr='جيدة';   note='مبني على ' + n + ' قراءات.'; }

    var spread = Math.max(srt[n-1] - srt[0], Math.round(weighted * 0.10));
    var pad = n < 3 ? Math.round(spread * 0.75) : Math.round(spread * 0.5);

    return {
      billId: billId, title: bill.title,
      expectedMinor: weighted, isManual: false,
      averageMinor: avg, medianMinor: med, weightedMinor: weighted,
      minMinor: srt[0], maxMinor: srt[n-1], lastMinor: a[n-1],
      trend: trend, trendAr: trendAr,
      confidence: conf, confidenceAr: confAr, note: note,
      rangeLowMinor: Math.max(0, weighted - pad),
      rangeHighMinor: weighted + pad,
      history: entries, entryCount: n
    };
  }

  function engineObligations() {
    var list = [];
    state.obligations.forEach(function (o) {
      if (!o.active || o.settled) return;
      list.push({ id:o.id, name:o.title, amount:o.amountMinor, dueDate:o.nextDueDate,
        category:o.category, isEssential:o.essentiality === 'essential',
        icon:o.icon, kind:'obligation' });
    });
    state.variableBills.forEach(function (b) {
      if (!b.active || b.settled) return;
      var f = forecast(b.id);
      if (!f || !f.expectedMinor) return;
      list.push({ id:b.id, name:b.title, amount:f.expectedMinor, dueDate:b.usualDueDate,
        category:b.category, isEssential:b.essentiality !== 'optional',
        icon:b.icon, kind:'variable_bill', isForecast:true, confidence:f.confidence });
    });
    return list.sort(function (x, y) { return x.dueDate.localeCompare(y.dueDate); });
  }

  function notify() {
    var snap = Store.getSnapshot();
    subs.forEach(function (fn) { try { fn(snap); } catch (e) {} });
  }

  /* ─── نفس واجهة QararStore تمامًا ─── */

  var Store = {
    __isFallback: true,      // ← علامة صريحة

    subscribe: function (fn) {
      subs.push(fn);
      return function () {
        var i = subs.indexOf(fn);
        if (i >= 0) subs.splice(i, 1);
      };
    },

    recalculateFinancialSnapshot: function () { notify(); return Store.getSnapshot(); },

    getProfile: function () { var p = {}; for (var k in state.profile) p[k] = state.profile[k]; return p; },

    updateProfile: function (patch) {
      for (var k in patch) state.profile[k] = patch[k];
      notify();
      return Store.getProfile();
    },

    getBalance: function () { return balance(); },

    getSnapshot: function () {
      return {
        profile:          Store.getProfile(),
        balanceMinor:     balance(),
        transactions:     state.transactions.slice(),
        obligations:      engineObligations(),
        rawObligations:   state.obligations.slice(),
        variableBills:    state.variableBills.slice(),
        billForecasts:    state.variableBills.map(function (b) { return forecast(b.id); }),
        plannedDecisions: state.plannedDecisions.slice(),
        savingsGoals:     state.savingsGoals.slice()
      };
    },

    buildEngineInput: function (newDecision) {
      return {
        asOfDate:       state.profile.asOfDate,
        currentBalance: balance(),
        safeFloor:      state.profile.safeBalanceMinor,
        monthlyIncome:  state.profile.monthlyIncomeMinor,
        nextSalaryDate: state.profile.salaryDate,
        obligations:    engineObligations(),
        newDecision:    newDecision || null
      };
    },

    getTransactions: function () {
      return state.transactions.slice().sort(function (a, b) {
        return b.transactionDate.localeCompare(a.transactionDate);
      });
    },

    getTransaction: function (id) {
      return state.transactions.filter(function (t) { return t.id === id; })[0] || null;
    },

    addTransaction: function (tx) {
      var amt = Math.abs(Number(tx.amountMinor));
      if (!isFinite(amt) || amt <= 0) throw new Error('مبلغ غير صالح');
      if (tx.type !== 'income' && tx.type !== 'expense') throw new Error('نوع غير صالح');
      var rec = {
        id: uid('tx'), type: tx.type, amountMinor: Math.round(amt),
        title: tx.title, merchantOrSource: tx.merchantOrSource || tx.title,
        category: tx.category || Store.classifyMerchant(tx.merchantOrSource || tx.title),
        transactionDate: tx.transactionDate, notes: tx.notes || '',
        source: tx.source || 'sandbox',
        icon: tx.icon || (tx.type === 'income' ? '💰' : '💳'),
        linkedObligationId: tx.linkedObligationId || null,
        linkedDecisionId: tx.linkedDecisionId || null,
        createdAt: '', updatedAt: ''
      };
      state.transactions.push(rec);
      notify();
      return rec;
    },

    updateTransaction: function (id, patch) {
      var i = -1;
      state.transactions.forEach(function (t, k) { if (t.id === id) i = k; });
      if (i < 0) throw new Error('العملية غير موجودة');
      if (patch.amountMinor != null) patch.amountMinor = Math.abs(Number(patch.amountMinor));
      for (var k in patch) state.transactions[i][k] = patch[k];
      state.transactions[i].id = id;
      notify();
      return state.transactions[i];
    },

    deleteTransaction: function (id) {
      var before = state.transactions.length;
      state.transactions = state.transactions.filter(function (t) { return t.id !== id; });
      notify();
      return state.transactions.length < before;
    },

    classifyMerchant: function (name) {
      var key = String(name || '').toLowerCase();
      for (var r in state.merchantRules) if (key.indexOf(r) >= 0) return state.merchantRules[r];
      return 'أخرى';
    },

    learnMerchant: function (n, c) {
      state.merchantRules[String(n || '').toLowerCase()] = c;
      notify();
    },

    getObligations:  function () { return state.obligations.slice(); },
    addObligation:   function (o) {
      state.obligations.push({
        id: uid('ob'), title: o.title, amountMinor: Math.abs(Number(o.amountMinor)),
        frequency: o.frequency || 'monthly', nextDueDate: o.nextDueDate,
        essentiality: o.essentiality || 'essential',
        category: o.category || 'التزامات', icon: o.icon || '📄',
        active: true, settled: false
      });
      notify();
    },
    updateObligation: function (id, patch) {
      var o = state.obligations.filter(function (x) { return x.id === id; })[0];
      if (!o) throw new Error('غير موجود');
      if (patch.amountMinor != null) patch.amountMinor = Math.abs(Number(patch.amountMinor));
      for (var k in patch) o[k] = patch[k];
      notify();
      return o;
    },
    deleteObligation: function (id) {
      state.obligations = state.obligations.filter(function (o) { return o.id !== id; });
      notify();
    },
    settleObligation: function (id, date) {
      var o = state.obligations.filter(function (x) { return x.id === id; })[0];
      if (!o) throw new Error('غير موجود');
      Store.addTransaction({ type:'expense', amountMinor:o.amountMinor, title:o.title,
        transactionDate: date || state.profile.asOfDate, icon:o.icon,
        linkedObligationId: id });
      o.settled = true;
      notify();
    },

    getVariableBills:    function () { return state.variableBills.slice(); },
    getBillForecast:     function (id) { return forecast(id); },
    getAllBillForecasts: function () {
      return state.variableBills.map(function (b) { return forecast(b.id); });
    },
    getBillHistory: function (id) {
      return state.billHistory.filter(function (h) { return h.billId === id; });
    },
    addBillEntry: function (e) {
      var ex = state.billHistory.filter(function (h) {
        return h.billId === e.billId && h.billingPeriod === e.billingPeriod; })[0];
      if (ex) ex.amountMinor = Math.abs(Number(e.amountMinor));
      else state.billHistory.push({ id: uid('bh'), billId: e.billId,
        billingPeriod: e.billingPeriod, amountMinor: Math.abs(Number(e.amountMinor)) });
      notify();
    },
    deleteBillEntry: function (id) {
      state.billHistory = state.billHistory.filter(function (h) { return h.id !== id; });
      notify();
    },
    setBillManualForecast: function (id, amt) {
      var b = state.variableBills.filter(function (x) { return x.id === id; })[0];
      if (!b) throw new Error('غير موجودة');
      b.manualForecastMinor = (amt == null) ? null : Math.abs(Number(amt));
      notify();
      return b;
    },
    updateVariableBill: function (id, patch) {
      var b = state.variableBills.filter(function (x) { return x.id === id; })[0];
      if (!b) throw new Error('غير موجودة');
      for (var k in patch) b[k] = patch[k];
      notify();
      return b;
    },

    getPlannedDecisions: function () { return state.plannedDecisions.slice(); },
    savePlannedDecision: function (d, a) {
      var rec = { id: uid('pd'), title: d.name, type: d.type, amountMinor: d.amount,
        plannedDate: d.targetDate, paymentMethod: d.paymentMode,
        essentiality: d.isEssential ? 'essential' : 'optional',
        months: d.months || null, status: 'planned',
        summary: a ? { minimumBalanceMinor: a.minimumBalance, riskLevel: a.riskLevel,
                       recommendation: a.recommendation,
                       safeMaximumMinor: a.safeMaximumAmount } : null,
        createdAt: '' };
      state.plannedDecisions.push(rec);
      notify();
      return rec;
    },
    executeDecision: function (id) {
      var d = state.plannedDecisions.filter(function (x) { return x.id === id; })[0];
      if (!d) throw new Error('غير موجود');
      if (d.status === 'executed') throw new Error('ALREADY_EXECUTED');
      Store.addTransaction({ type:'expense', amountMinor:d.amountMinor, title:d.title,
        transactionDate: state.profile.asOfDate, icon:'🎯', linkedDecisionId:id });
      d.status = 'executed';
      notify();
      return d;
    },
    cancelDecision: function (id) {
      var d = state.plannedDecisions.filter(function (x) { return x.id === id; })[0];
      if (d) d.status = 'cancelled';
      notify();
    },
    deleteDecision: function (id) {
      state.plannedDecisions = state.plannedDecisions.filter(function (d) { return d.id !== id; });
      notify();
    },

    getGoals: function () { return state.savingsGoals.slice(); },
    addGoal:  function (g) {
      g.id = uid('gl'); g.savedMinor = 0;
      state.savingsGoals.push(g);
      notify();
    },

    getSpendingHabits: function () {
      var by = {};
      state.transactions.filter(function (t) { return t.type === 'expense'; })
        .forEach(function (t) {
          if (!by[t.category]) by[t.category] = { category:t.category, totalMinor:0, count:0 };
          by[t.category].totalMinor += t.amountMinor;
          by[t.category].count++;
        });
      return Object.keys(by).map(function (k) {
        by[k].averageMinor = Math.round(by[k].totalMinor / by[k].count);
        return by[k];
      }).sort(function (a, b) { return b.totalMinor - a.totalMinor; });
    },

    reset: function () { state = freshState(); notify(); return state; },

    /* 🔴 صريح: هذا متجر بديل — لا يحفظ */
    isPersistent: function () { return false; },

    _resetForTest:     function () { state = freshState(); return state; },
    _clearSubmitGuard: function () {}
  };

  global.QararFallbackStore = Store;

})(typeof globalThis !== 'undefined' ? globalThis : this);

  </script>

  <!-- 🛡 المحركات البديلة — تُثبَّت فقط لو فشل تحميل الملفات الحقيقية أعلاه -->
  <script>
/* ═══════════════════════════════════════════════════════════════════════
 * 🛡 محرك بديل مبسّط — مضمّن (لا ملف خارجي)
 *
 * يُستخدم *فقط* لو فشل تحميل decision-engine.js.
 * يقدّم نفس الواجهة حتى لا تنهار views.home().
 *
 * ⚠️ صريح: هذا حساب مبسّط للعرض فقط. المحرك الحقيقي أدق وأشمل
 *    (بدائل · خط زمني كامل · أفضل تاريخ · تقسيط).
 *    لكن الأرقام الأساسية (أقل رصيد · أقصى آمن) صحيحة حسابيًا.
 * ═══════════════════════════════════════════════════════════════════════ */
(function (global) {
  'use strict';
  if (typeof global.QararEngine !== 'undefined') return;   // الحقيقي موجود

  var Money = {
    fromRiyal: function (r) { return Math.round(r * 100); },
    toRiyal:   function (h) { return h / 100; },
    format:    function (h) {
      return (h / 100).toLocaleString('ar-SA',
        { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    },
    formatWithCurrency: function (h) { return Money.format(h) + ' ر.س'; }
  };

  var DateUtil = {
    toDayNumber: function (iso) {
      var p = String(iso).split('-').map(Number);
      return Math.floor(Date.UTC(p[0], p[1] - 1, p[2]) / 86400000);
    },
    fromDayNumber: function (n) {
      var d = new Date(n * 86400000);
      return d.getUTCFullYear() + '-' +
             String(d.getUTCMonth() + 1).padStart(2, '0') + '-' +
             String(d.getUTCDate()).padStart(2, '0');
    },
    addDays:  function (iso, n) { return DateUtil.fromDayNumber(DateUtil.toDayNumber(iso) + n); },
    diffDays: function (a, b) { return DateUtil.toDayNumber(b) - DateUtil.toDayNumber(a); },
    formatArabic: function (iso) {
      var m = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
               'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
      var p = String(iso).split('-').map(Number);
      return Number(p[2]).toLocaleString('ar-SA') + ' ' + m[p[1] - 1];
    }
  };

  var RISK = { LOW:'low', MEDIUM:'medium', HIGH:'high', CRITICAL:'critical' };
  var RISK_AR = { low:'منخفض', medium:'متوسط', high:'مرتفع', critical:'حرج' };
  var REC = { PROCEED:'proceed', PROCEED_CAUTION:'proceed_with_caution',
              REDUCE_AMOUNT:'reduce_amount', WAIT_FOR_SALARY:'wait_for_salary',
              DELAY_TO_DATE:'delay_to_date', CONVERT_TO_GOAL:'convert_to_goal',
              NOT_ADVISED:'not_advised' };
  var REC_AR = { proceed:'نفّذ القرار', proceed_with_caution:'نفّذه بحذر',
                 reduce_amount:'قلّل المبلغ', wait_for_salary:'انتظر نزول الراتب',
                 delay_to_date:'أجّله', convert_to_goal:'حوّله إلى هدف ادخار',
                 not_advised:'لا يُنصح به حاليًا' };

  function analyzeDecision(input) {
    if (!input || !isFinite(input.currentBalance)) {
      return { ok:false, errors:['مدخلات غير صالحة'] };
    }

    var bal   = input.currentBalance;
    var floor = input.safeFloor || 0;
    var start = DateUtil.toDayNumber(input.asOfDate);
    var salaryDay = input.nextSalaryDate
      ? DateUtil.toDayNumber(input.nextSalaryDate) : start + 30;

    /* الالتزامات قبل الراتب */
    var obsTotal = 0;
    var events = [];
    (input.obligations || []).forEach(function (o) {
      var d = DateUtil.toDayNumber(o.dueDate);
      if (d >= start && d <= salaryDay) obsTotal += Math.abs(o.amount);
      if (d >= start) {
        events.push({ day:d, date:o.dueDate, label:o.name,
          icon:o.icon || '📄', amount:-Math.abs(o.amount), type:'obligation' });
      }
    });

    var amt = 0;
    if (input.newDecision) {
      amt = (input.newDecision.paymentMode === 'installment' && input.newDecision.months)
        ? Math.round(input.newDecision.amount / input.newDecision.months)
        : input.newDecision.amount;
      events.push({ day:DateUtil.toDayNumber(input.newDecision.targetDate),
        date:input.newDecision.targetDate, label:input.newDecision.name || 'القرار',
        icon:'🎯', amount:-amt, type:'decision' });
    }

    if (input.nextSalaryDate && input.monthlyIncome) {
      events.push({ day:salaryDay, date:input.nextSalaryDate,
        label:'الراتب الشهري', icon:'💰',
        amount:Math.abs(input.monthlyIncome), type:'income' });
    }

    events.sort(function (a, b) {
      return a.day !== b.day ? a.day - b.day : a.amount - b.amount;
    });

    /* الخط الزمني */
    var run = bal, minBal = bal, minDate = input.asOfDate;
    var timeline = [], daysBelow = 0, negative = bal < 0;

    events.forEach(function (e) {
      var before = run;
      run += e.amount;
      if (run < minBal) { minBal = run; minDate = e.date; }
      if (run < 0) negative = true;
      if (run < floor) daysBelow++;
      timeline.push({ date:e.date, label:e.label, icon:e.icon, amount:e.amount,
        balanceBefore:before, balanceAfter:run, type:e.type,
        isEssential:true, isDecision:e.type === 'decision' });
    });

    /* الخطر */
    var level = RISK.LOW, reasons = [];
    if (negative) {
      level = RISK.CRITICAL;
      reasons.push({ code:'NEG', text:'الرصيد سيصبح سالبًا خلال الفترة القادمة.' });
    } else if (minBal < floor) {
      level = RISK.HIGH;
      reasons.push({ code:'BELOW', text:'أقل رصيد متوقع ('
        + Money.formatWithCurrency(minBal) + ') أقل من حدك الآمن ('
        + Money.formatWithCurrency(floor) + ').' });
    } else if (minBal < floor * 1.25) {
      level = RISK.MEDIUM;
      reasons.push({ code:'NEAR', text:'أقل رصيد متوقع قريب من حدك الآمن — الهامش ضيق.' });
    } else {
      reasons.push({ code:'SAFE', text:'الرصيد المتوقع يبقى فوق حدك الآمن.' });
    }

    var safeMax = Math.max(0, bal - obsTotal - floor);

    var rec = (level === RISK.CRITICAL) ? REC.NOT_ADVISED
            : (level === RISK.HIGH)     ? REC.WAIT_FOR_SALARY
            : (level === RISK.MEDIUM)   ? REC.PROCEED_CAUTION
            :                             REC.PROCEED;

    /* بدائل */
    var alts = [];
    if (level === RISK.HIGH || level === RISK.CRITICAL) {
      if (input.nextSalaryDate) {
        alts.push({ id:'delay_to_salary', icon:'📅', title:'تأجيل إلى ما بعد الراتب',
          description:'انتظر نزول الراتب في '
            + DateUtil.formatArabic(input.nextSalaryDate) + '.',
          newDate:input.nextSalaryDate, impact:'يزيل الخطر' });
      }
      if (safeMax > 0 && amt > safeMax) {
        alts.push({ id:'reduce_amount', icon:'✂️', title:'تقليل المبلغ',
          description:'أقصى مبلغ آمن الآن: ' + Money.formatWithCurrency(safeMax) + '.',
          newAmount:safeMax, impact:'توفير ' + Money.formatWithCurrency(amt - safeMax) });
      }
      alts.push({ id:'cancel', icon:'✕', title:'إلغاء القرار',
        description:'أبقِ وضعك المالي كما هو.', impact:'لا تغيير' });
    }

    return {
      ok: true,
      input: { asOfDate:input.asOfDate, currentBalance:bal,
               safeFloor:floor, decisionAmount:amt },
      currentBalance: bal,
      balanceAfterDecision: bal - amt,
      minimumBalance: minBal,
      minimumBalanceDate: minDate,
      balanceBeforeSalary: minBal,
      safeFloor: floor,
      gapFromSafeFloor: minBal - floor,
      daysBelowSafeFloor: daysBelow,
      goesNegative: negative,
      unfundedBills: [],
      obligationsBeforeSalary: obsTotal,
      safeMaximumAmount: safeMax,
      comparison: {
        withoutDecision: { minimumBalance: bal - obsTotal,
                           minimumBalanceDate: minDate,
                           belowSafeFloor: (bal - obsTotal) < floor },
        withDecision:    { minimumBalance: minBal, minimumBalanceDate: minDate,
                           belowSafeFloor: minBal < floor },
        difference: -amt
      },
      riskLevel: level,
      riskLevelAr: RISK_AR[level],
      riskReasons: reasons,
      recommendation: rec,
      recommendationAr: REC_AR[rec],
      recommendedDate: null,
      alternatives: alts,
      timeline: timeline,
      __isFallbackEngine: true
    };
  }

  global.QararEngine = {
    analyzeDecision: analyzeDecision,
    Money: Money, DateUtil: DateUtil,
    RISK: RISK, RISK_LABEL_AR: RISK_AR,
    RECOMMENDATION: REC, RECOMMENDATION_LABEL_AR: REC_AR,
    __isFallback: true
  };

  console.warn('[Qarar] 🛡 المحرك الحقيقي غير محمّل — استُخدم المحرك البديل المبسّط.');

})(typeof globalThis !== 'undefined' ? globalThis : this);
  </script>

  <script>
/* ═══════════════════════════════════════════════════════════════════════
 * 🛡 حدود الأخطاء (Error Boundary)
 *
 * سبب وجوده: انكسر زر «ابدأ التجربة» بسبب ReferenceError صامت.
 * المستخدم لم يرَ شيئًا — الزر ببساطة لم يفعل شيئًا.
 *
 * الآن: أي خطأ غير متوقع يُلتقط ويُعرض بوضوح، ولا يُسقِط التطبيق.
 * ═══════════════════════════════════════════════════════════════════════ */

window.__qararErrors = [];
window.__qararEntered = false;      // هل دخل المستخدم المنصة؟
window.__watchdogTimer = null;

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ enterAppSafely() — المصدر الوحيد لدخول المنصة
 *
 * كل مسارات الدخول تمرّ من هنا. لا تكرار للمنطق في أي مكان آخر.
 *
 * قواعد صارمة:
 *   1. لا يعتمد على أي شيء خارجي (لا AI · لا شبكة · لا localStorage · لا خطوط).
 *   2. كل خطوة معزولة في try/catch — فشل خطوة لا يمنع البقية.
 *   3. آمن للاستدعاء أكثر من مرة (idempotent).
 *   4. حتى لو فشل كل شيء، يُزيل الطبقات الحاجبة قسرًا.
 * ═══════════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ prepareDependencies() — استراتيجية الاسترداد المتدرجة
 *
 * 🔴 القاعدة: **لا يختفي التطبيق أبدًا.** فشل جزء ⇒ بديل لذلك الجزء فقط.
 *
 *   المستوى ١ — كل شيء يعمل        → البيانات الحقيقية
 *   المستوى ٢ — AI فشل             → التطبيق كامل · المساعد يتحول لـFallback
 *   المستوى ٣ — localStorage فشل   → التطبيق كامل · متجر في الذاكرة
 *   المستوى ٤ — data-store.js فشل  → التطبيق كامل · المتجر البديل المضمّن
 *   المستوى ٥ — بيانات فاسدة       → إصلاح البيانات فقط (لا حذف الواجهة)
 *   المستوى ٦ — فشل مستحيل         → عندها فقط Error State
 *
 * يُرجع: مستوى الاسترداد (1-6)
 * ═════════════════════════════════════════════════════════════════════ */

function prepareDependencies(){
  var level = 1;
  var notes = [];

  /* ── (١) المحرك — لا يمكن الاستغناء عنه، لكن له بديل حسابي بسيط ── */
  if (typeof QararEngine === 'undefined' || !QararEngine.analyzeDecision) {
    level = Math.max(level, 4);
    notes.push('محرك القرار غير محمّل');
  }

  /* ── (٢) بيانات العرض ── */
  if (typeof QararDemo === 'undefined') {
    level = Math.max(level, 4);
    notes.push('بيانات العرض غير محمّلة');
  }

  /* ── (٣) ⭐ المتجر — أهم اعتماد. الواجهة كلها تقرأ منه ── */
  var storeOk = false;
  try {
    if (typeof QararStore !== 'undefined' && QararStore.getSnapshot) {
      /* اختبار حقيقي: هل يعمل فعلًا؟ (قد يكون معرّفًا لكن localStorage محظور) */
      var probe = QararStore.getSnapshot();
      storeOk = !!(probe && probe.profile && typeof probe.balanceMinor === 'number');
      if (!storeOk) notes.push('المتجر أرجع بيانات غير صالحة');
    }
  } catch (e) {
    notes.push('المتجر يرمي خطأ: ' + e.message);
  }

  if (!storeOk) {
    /* 🔴 المتجر الحقيقي فشل → نستبدله بالبديل المضمّن.
     *    الواجهة لا تعرف الفرق — نفس الواجهة تمامًا.
     *    ⭐ هذا ما يمنع اختفاء لوحة التحكم. */
    if (typeof QararFallbackStore !== 'undefined') {
      window.QararStore = QararFallbackStore;
      level = Math.max(level, 4);
      notes.push('تم التحويل إلى المتجر البديل (بيانات العرض — لا حفظ)');
    } else {
      level = 6;   /* مستحيل نظريًا — البديل مضمّن في HTML */
      notes.push('🔴 لا يوجد متجر إطلاقًا');
    }
  } else {
    /* المتجر يعمل — لكن هل الحفظ يعمل؟ */
    try {
      if (QararStore.isPersistent && !QararStore.isPersistent()) {
        level = Math.max(level, 3);
        notes.push('التخزين المحلي معطّل — العمل بالذاكرة');
      }
    } catch (e) {}
  }

  /* ── (٤) المساعد الذكي — غير أساسي إطلاقًا ── */
  if (typeof QararAgent === 'undefined') {
    level = Math.max(level, 2);
    notes.push('المساعد الذكي غير متاح (الوضع الاحتياطي)');
  }

  /* ── (٥) فحص سلامة البيانات — إصلاح لا حذف ── */
  try {
    var snap = QararStore.getSnapshot();
    if (!snap.profile || !isFinite(snap.balanceMinor)) {
      throw new Error('بيانات تالفة');
    }
  } catch (e) {
    /* 🔴 بيانات فاسدة → نصلحها فقط. الواجهة تبقى. */
    try {
      QararStore.reset();
      level = Math.max(level, 5);
      notes.push('بيانات تالفة — أُعيد ضبطها');
    } catch (e2) {
      if (typeof QararFallbackStore !== 'undefined') {
        window.QararStore = QararFallbackStore;
        level = Math.max(level, 5);
        notes.push('بيانات تالفة — تحويل إلى المتجر البديل');
      } else {
        level = 6;
      }
    }
  }

  window.__recoveryLevel = level;
  window.__recoveryNotes = notes;

  if (level > 1) {
    console.warn('[Qarar] 🛡 مستوى الاسترداد: ' + level, notes);
  }
  return level;
}

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ enterAppSafely() — المصدر الوحيد للدخول
 *
 * الترتيب الصحيح (وهذا هو التصحيح الجوهري):
 *   ١. تجهيز الاعتمادات (بديل عند الحاجة)
 *   ٢. رسم التطبيق **كاملًا**
 *   ٣. ثم — وفقط ثم — إخفاء الطبقات
 *
 * 🔴 سابقًا كان: إخفاء الطبقات ← ثم رسم ← فشل ← «تعذر تحميل لوحة التحكم».
 *    الآن: نُجهّز أولًا، فلا شيء يفشل.
 * ═════════════════════════════════════════════════════════════════════ */

function enterAppSafely(reason){
  if (window.__qararEntered) return true;
  window.__qararEntered = true;

  if (window.__watchdogTimer) {
    clearTimeout(window.__watchdogTimer);
    window.__watchdogTimer = null;
  }

  /* ═══ (١) تجهيز الاعتمادات — قبل أي رسم ═══ */
  var level = 6;
  try {
    level = prepareDependencies();
  } catch (e) {
    console.error('[Qarar] فشل تجهيز الاعتمادات:', e);
    /* حتى هنا: نحاول البديل */
    try {
      if (typeof QararFallbackStore !== 'undefined') {
        window.QararStore = QararFallbackStore;
        level = 4;
      }
    } catch (e2) {}
  }

  /* ═══ ⭐ (١.٥) ربط الواجهة بالمتجر النهائي — بعد اختياره، قبل الرسم ═══ */
  try { bindActiveStore(); }
  catch(e){ console.error('[Qarar] تعذر ربط المتجر:', e); }

  /* ═══ (٢) رسم التطبيق كاملًا — الشريط الجانبي + لوحة التحكم ═══ */
  var rendered = false;

  try { renderNav(); }
  catch (e) { console.error('[Qarar] فشل رسم القائمة:', e); }

  try {
    var v = document.getElementById('view');
    if (v && typeof views !== 'undefined' && views.home) {
      v.innerHTML = views.home();          // ⭐ لوحة التحكم الكاملة
      if (typeof afterRender === 'function') afterRender('home');
      rendered = v.innerHTML.length > 500; // تحقق فعلي أنها رُسمت
    }
  } catch (e) {
    console.error('[Qarar] فشل رسم لوحة التحكم:', e);
  }

  /* محاولة ثانية بالمتجر البديل — قبل الاستسلام */
  if (!rendered) {
    try {
      if (typeof QararFallbackStore !== 'undefined' &&
          window.QararStore !== QararFallbackStore) {
        console.warn('[Qarar] 🛡 إعادة المحاولة بالمتجر البديل...');
        window.QararStore = QararFallbackStore;
        bindActiveStore();                 // ⭐ أعد الربط بالمتجر الجديد
        level = Math.max(level, 4);
        var v2 = document.getElementById('view');
        v2.innerHTML = views.home();
        if (typeof afterRender === 'function') afterRender('home');
        rendered = v2.innerHTML.length > 500;
      }
    } catch (e) {
      console.error('[Qarar] فشلت المحاولة الثانية:', e);
    }
  }

  /* 🔴 المستوى ٦ — فشل حقيقي لا يمكن إصلاحه (لم يحدث في أي اختبار) */
  if (!rendered) {
    level = 6;
    try {
      document.getElementById('view').innerHTML =
        '<div class="card"><h4>تعذر تحميل لوحة التحكم</h4>'
        + '<p>يبدو أن ملفات المشروع غير مكتملة.</p>'
        + '<p><b>تأكد أنك فككتَ ضغط الملف كاملًا (Extract All)</b> '
        + 'ثم افتح <code>index.html</code> من المجلد المستخرج — '
        + 'وليس من داخل الـZIP مباشرة.</p></div>';
    } catch (e) {}
  }

  /* ═══ (٣) الآن فقط — إخفاء الطبقات ═══ */
  try {
    var sp = document.getElementById('splash');
    if (sp) { sp.classList.add('hide'); sp.style.display = 'none'; }
  } catch(e){}

  try {
    var ld = document.getElementById('loading');
    if (ld) { ld.classList.add('hide'); ld.style.display = 'none'; }
  } catch(e){}

  try {
    var shell = document.querySelector('.app-shell');
    if (shell) shell.classList.remove('prelaunch');
  } catch(e){}

  /* ═══ (٤) إشعار المستخدم — صريح، بلا مبالغة ═══ */
  try {
    if (level === 1) {
      if (typeof toast === 'function') toast('مرحبًا بك في منصة قرار');
    } else if (level <= 4 && rendered) {
      /* التطبيق كامل — فقط بعض القدرات محدودة */
      if (typeof toast === 'function') {
        toast(level === 2 ? 'المساعد الذكي في الوضع الاحتياطي'
            : level === 3 ? 'الحفظ معطّل — البيانات في الذاكرة فقط'
            : 'تعمل ببيانات العرض — الحفظ غير متاح');
      }
      showRecoveryBanner(level);
    } else if (level === 5 && rendered) {
      if (typeof toast === 'function') toast('أُعيد ضبط البيانات التالفة');
    }
  } catch(e){}

  console.log('[Qarar] ✓ دخل المستخدم المنصة | مستوى: ' + level
              + ' | لوحة التحكم: ' + (rendered ? '✓ كاملة' : '✗ فشلت'));
  return rendered;
}

/** شريط تنبيه لطيف — لا يحجب شيئًا */
function showRecoveryBanner(level){
  if (document.getElementById('recBanner')) return;
  var msgs = {
    2: 'المساعد الذكي غير متاح — بقية المنصة تعمل بالكامل.',
    3: 'التخزين المحلي معطّل — بياناتك لن تُحفظ بعد إغلاق الصفحة.',
    4: 'تعمل ببيانات العرض التجريبية — تأكد من فك ضغط الملف كاملًا (Extract All).'
  };
  var m = msgs[level];
  if (!m) return;
  var host = document.getElementById('view');
  if (!host) return;
  var b = document.createElement('div');
  b.id = 'recBanner';
  b.className = 'demo-banner';
  b.style.borderColor = 'rgba(244,162,97,.5)';
  b.innerHTML = '<span class="demo-ico">🛡</span><div>'
    + '<b>وضع الاسترداد</b><span>' + m + '</span></div>';
  host.insertBefore(b, host.firstChild);
}

/* ═══════════════════════════════════════════════════════════════════════
 * 🐕 Startup Watchdog — لا Loading أبدي، إطلاقًا
 *
 * يبدأ عند الضغط على زر البداية. إن لم يكتمل الدخول خلال 2.5 ثانية
 * لأي سبب كان → يدخل المستخدم قسرًا.
 * ═══════════════════════════════════════════════════════════════════════ */

function armStartupWatchdog(){
  if (window.__watchdogTimer) clearTimeout(window.__watchdogTimer);
  window.__watchdogTimer = setTimeout(function(){
    if (!window.__qararEntered) {
      console.error('[Qarar] 🐕 Watchdog: لم يكتمل الدخول خلال 2.5 ثانية — دخول قسري.');
      enterAppSafely('watchdog_timeout');
    }
  }, 2500);
}

/* ═══════════════════════════════════════════════════════════════════════
 * 🛡 حدود الأخطاء
 * ═══════════════════════════════════════════════════════════════════════ */

window.__bootFailed = false;

window.addEventListener('error', function(ev){
  window.__qararErrors.push(String(ev.message || ev.error));
  console.error('[Qarar] خطأ:', ev.error || ev.message);

  /* نُعلّم أن التمهيد فشل — حتى لو حدث الخطأ قبل الضغط على الزر */
  window.__bootFailed = true;

  /* لو ضُغط الزر والمستخدم ما زال عالقًا → أدخله فورًا */
  if (!window.__qararEntered && window.__startClicked) {
    enterAppSafely('js_error');
  }
});

window.addEventListener('unhandledrejection', function(ev){
  window.__qararErrors.push(String(ev.reason));
  console.error('[Qarar] وعد مرفوض:', ev.reason);
  /* 🔴 فشل AI / الشبكة لا يُسقِط التطبيق أبدًا */

function lineChart(values, color='#6D5DFB'){
  const max = Math.max(...values), min = Math.min(...values);
  const pts = values.map((v,i)=>{
    const x = 20 + i*(320/(values.length-1));
    const y = 150 - ((v-min)/(max-min || 1))*110;
    return [x,y];
  });
  const d = pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' ');
  const area = `${d} L340,165 L20,165 Z`;
  return `<svg class="line-chart" viewBox="0 0 360 190" preserveAspectRatio="none">
    <defs><linearGradient id="lg${Math.random().toString(36).slice(2)}" x1="0" x2="0" y1="0" y2="1"><stop stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path class="area" d="${area}" fill="rgba(109,93,251,.13)"/>
    <path class="line" d="${d}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#fff" stroke="${color}" stroke-width="3"/>`).join('')}
  </svg>`;
}
function bars(vals){
  const max = Math.max(...vals);
  return `<div class="bars">${vals.map(v=>`<i class="bar" style="height:${Math.max(20, v/max*150)}px"></i>`).join('')}</div>`;
}

/** 🔒 تهريب HTML — يمنع حقن الكود عبر أسماء العمليات (XSS) */
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/** حالة المنصة — صريحة، بلا تضليل */
function platformStatusRows(){
  const st = storageStatus();
  const engineFb = !!(window.QararEngine && QararEngine.__isFallback);
  const aiMode = (typeof QararAgent !== 'undefined')
    ? (QararAgent.getMode && QararAgent.getMode()==='ai' ? 'AI متصل ✓' : 'وضع احتياطي ⚠️')
    : 'غير متاح ⚠️';

  const row = (label, value, ok) => `
    <div class="status-row">
      <span>${label}</span>
      <b class="${ok?'st-ok':'st-warn'}">${value}</b>
    </div>`;

  return `<div class="status-list">
    ${row('محرك القرار', engineFb ? 'محرك بديل ⚠️' : 'يعمل ✓', !engineFb)}
    ${row('التخزين', st.label, st.persistent)}
    ${row('المساعد', aiMode, aiMode.includes('✓'))}
    ${row('البيئة', 'Sandbox تجريبية', true)}
  </div>
  ${st.warning ? `<p class="storage-warn">⚠️ ${esc(st.warning)}</p>` : ''}`;
}

function demoBanner(){
  const st = storageStatus();
  return `<div class="demo-banner">
    <span class="demo-ico">⚠️</span>
    <div>
      <b>بيئة تجريبية — لا توجد بيانات مصرفية حقيقية.</b>
      <span>لا يوجد ربط بنكي فعلي. الأرقام لأغراض العرض فقط.
      ${st.persistent
        ? 'البيانات محفوظة محليًا في متصفحك (حفظ مؤقت للعرض).'
        : '<b style="color:#C85435">⚠️ ' + esc(st.warning) + '</b>'}</span>
    </div>
  </div>`;
}

function metric(label,value,note,type='violet'){
  const cls = type==='orange'?'orange':type==='mint'?'mint':'';
  return `<div class="card metric-card"><span class="metric-label">${label}</span><div class="metric-value">${value}</div><div class="metric-note"><span class="pill ${cls}">${note}</span></div></div>`;
}
function insight(icon,title,text){return `<div class="insight"><span class="bubble">${icon}</span><div><b>${title}</b><span>${text}</span></div></div>`}
function visualCard(title, text, visual){return `<div class="card chart-card"><h4>${title}</h4><p>${text}</p>${visual}</div>`}
function timeline(items){return `<div class="timeline">${items.map(i=>`<div class="timeline-item"><div class="timeline-dot">${i[3]}</div><div class="timeline-box"><b>${i[0]} — ${i[1]}</b><span>${i[2]}</span></div></div>`).join('')}</div>`}
function actionCard(title,value,note){return `<div class="card"><span class="metric-label">${title}</span><div class="metric-value">${value}</div><p>${note}</p></div>`}

function afterRender(id){

}
function bindTabs(){
  document.querySelectorAll('[data-tab]').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-tab]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const id = btn.dataset.tab;
    const map = {overview:analysisOverview, spending:analysisSpending, obligations:analysisObligations, forecastTab:analysisForecast};
    $('#tabContent').innerHTML = (map[id]||analysisOverview)();
  }));

/* ═══════════════════════════════════════════════════════════════════════
 * محرك القرار — الربط الحقيقي
 * كل رقم هنا يأتي من QararEngine. لا معادلات تجميلية. لا أرقام مكتوبة.
 * ═════════════════════════════════════════════════════════════════════ */

/* 🛡 محصّن: لو فشل تحميل decision-engine.js، لا نُسقِط السكربت كله.
 * (سابقًا: هذا السطر كان يرمي ReferenceError فيتوقف كل ما بعده —
 *  بما فيه مُفوِّض الأحداث والتمهيد — فيبقى المستخدم عالقًا.) */
const Money = (typeof QararEngine !== 'undefined' && QararEngine.Money)
  ? QararEngine.Money
  : { fromRiyal:function(r){return Math.round(r*100);},
      toRiyal:function(h){return h/100;},
      format:function(h){return String(h/100);},
      formatWithCurrency:function(h){return (h/100)+' ر.س';} };

const DateU = (typeof QararEngine !== 'undefined' && QararEngine.DateUtil)
  ? QararEngine.DateUtil
  : { formatArabic:function(d){return String(d);},
      addDays:function(d){return d;}, diffDays:function(){return 0;},
      toDayNumber:function(){return 0;}, fromDayNumber:function(){return '';} };

let lastAnalysis = null;   // آخر نتيجة تحليل (للبدائل)

/** تنسيق مبلغ بالهللة → نص عربي */
function riyal(halala){ return Money.formatWithCurrency(halala); }

/** لون حسب مستوى الخطر */
function riskColor(level){
  return level === 'critical' ? '#DC2626'
       : level === 'high'     ? '#FF7A59'
       : level === 'medium'   ? '#F4A261'
       :                        '#27C7A8';
}
function riskPillClass(level){
  return (level === 'critical' || level === 'high') ? 'orange'
       : level === 'medium' ? 'orange' : 'mint';
}

/* ───────────────────────────────────────────────────────────────────────
 * تحليل القرار — يستدعي المحرك الحقيقي
 * ─────────────────────────────────────────────────────────────────── */

function runDecisionAnalysis(btn){
  const button = btn || document.querySelector('[data-action="simulateDecision"]');
  const resEl  = $('#decisionResult');

  /* منع الضغط المتكرر */
  if (button && button.disabled) return;

  try{
    /* ── (١) حالة التحميل ── */
    if (button){
      button.disabled = true;
      button.dataset.label = button.textContent;
      button.textContent = 'جارٍ التحليل...';
    }
    if (resEl){
      resEl.classList.add('show');
      resEl.innerHTML = '<div class="analyzing"><span class="dot-pulse"></span> '
                      + 'جارٍ تحليل أثر القرار على رصيدك والتزاماتك...</div>';
    }

    /* ── (٢) قراءة المدخلات ── */
    const name        = $('#decisionName')?.value?.trim() || 'قرار جديد';
    const type        = $('#decisionType')?.value || 'purchase';
    const amountRiyal = Number($('#decisionAmount')?.value || 0);
    const targetDate  = $('#decisionDate')?.value
                        || QararStore.getProfile().asOfDate;
    const essential   = $('#decisionEssential')?.value === 'yes';
    const payMode     = $('#decisionPayMode')?.value || 'one_time';
    const months      = Number($('#decisionMonths')?.value || 6);

    if (!amountRiyal || amountRiyal <= 0){
      throw new Error('أدخل مبلغًا صحيحًا أكبر من صفر.');
    }

    /* ── (٣) ⭐ تأكيد ارتباط المتجر الصحيح قبل بناء المدخلات ── */
    bindActiveStore();

    const input = QararStore.buildEngineInput({
      type, name,
      amount:      Money.fromRiyal(amountRiyal),
      targetDate:  targetDate,
      isEssential: essential,
      paymentMode: payMode,
      months:      months
    });

    /* ── (٤) ⭐ تشغيل المحرك — لا setTimeout، لا انتظار ── */
    const result = QararEngine.analyzeDecision(input);

    if (!result || !result.ok){
      throw new Error((result && result.errors)
        ? result.errors.join(' · ') : 'المحرك أرجع نتيجة غير صالحة.');
    }

    /* ── (٥) عرض النتيجة ── */
    lastAnalysis = result;
    renderDecisionResult(result);

    const obsCount = (input.obligations || []).length;
    toast(`تم تحليل القرار بناءً على ${obsCount.toLocaleString('ar-SA')} التزامات قادمة.`);

  }catch(err){
    console.error('[Qarar] فشل تحليل القرار:', err);
    showDecisionError(err);

  }finally{
    /* ── (٦) دائمًا: أعد تفعيل الزر ── */
    if (button){
      button.disabled = false;
      button.textContent = button.dataset.label || 'تحليل الأثر';
    }
  }
}

/** حالة خطأ واضحة — لا زر ميت ولا شاشة فارغة */
function showDecisionError(err){
  const el = $('#decisionResult');
  if(!el) return;
  el.classList.add('show');
  el.innerHTML = `
    <div class="decision-error">
      <span class="de-ico">⚠️</span>
      <h4>تعذر تحليل القرار</h4>
      <p class="de-msg">${esc(err && err.message ? err.message : 'خطأ غير معروف')}</p>
      <div class="hero-actions">
        <button class="btn primary" data-action="retryAnalysis">إعادة المحاولة</button>
        <button class="btn outline" data-action="resetFromError">إعادة ضبط بيانات العرض</button>
      </div>
    </div>`;
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ───────────────────────────────────────────────────────────────────────
 * عرض نتيجة التحليل
 * ─────────────────────────────────────────────────────────────────── */

function renderDecisionResult(r){
  const el = $('#decisionResult');
  const color = riskColor(r.riskLevel);
  const below = r.gapFromSafeFloor < 0;

  const reasons = r.riskReasons.map(x =>
    `<div class="insight"><span class="bubble">${below?'⚠️':'✓'}</span><div><span>${x.text}</span></div></div>`
  ).join('');

  const alts = r.alternatives.map(a => `
    <button class="card alt-card" data-action="applyAlt" data-alt="${a.id}">
      <div class="alt-head"><span class="alt-ico">${a.icon}</span><b>${a.title}</b></div>
      <p>${a.description}</p>
      <span class="pill ${a.id==='cancel'?'':'mint'}">${a.impact}</span>
    </button>`).join('');

  // الخط الزمني حتى الراتب
  const tl = r.timeline.slice(0, 8).map(t => `
    <div class="timeline-item">
      <div class="timeline-dot">${t.icon}</div>
      <div class="timeline-box">
        <b>${DateU.formatArabic(t.date)} — ${t.label}</b>
        <span>${t.amount < 0 ? '−' : '+'}${riyal(Math.abs(t.amount))}
          &nbsp;·&nbsp; الرصيد بعدها:
          <b style="color:${t.balanceAfter < r.safeFloor ? '#DC2626' : '#11806E'}">
            ${riyal(t.balanceAfter)}
          </b>
        </span>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="result-banner" style="border-right:6px solid ${color}">
      <div>
        <span class="pill ${riskPillClass(r.riskLevel)}">مستوى الخطر: ${r.riskLevelAr}</span>
        <h3 style="margin:10px 0 4px">${r.recommendationAr}</h3>
        <p style="margin:0">التحليل مبني على رصيدك والتزاماتك القادمة وموعد راتبك.</p>
      </div>
    </div>

    <div class="grid four" style="margin-top:16px">
      ${metric('الرصيد الحالي', riyal(r.currentBalance), 'قبل القرار', 'violet')}
      ${metric('الرصيد بعد القرار', riyal(r.balanceAfterDecision), 'مباشرة بعد الدفع', 'orange')}
      ${metric('⭐ أقل رصيد متوقع', riyal(r.minimumBalance),
               DateU.formatArabic(r.minimumBalanceDate), below?'orange':'mint')}
      ${metric('الفرق عن الحد الآمن', riyal(r.gapFromSafeFloor),
               below?'تحت الحد الآمن':'فوق الحد الآمن', below?'orange':'mint')}
    </div>

    <div class="grid four" style="margin-top:14px">
      ${metric('الالتزامات قبل الراتب', riyal(r.obligationsBeforeSalary), 'فواتير واشتراكات','violet')}
      ${metric('حدك الآمن', riyal(r.safeFloor), 'الذي حددته أنت','violet')}
      ${metric('⭐ أقصى مبلغ آمن الآن', riyal(r.safeMaximumAmount), 'يمكنك دفعه دون خطر','mint')}
      ${metric('أيام تحت الحد الآمن', r.daysBelowSafeFloor.toLocaleString('ar-SA'), 'خلال الفترة القادمة',
               r.daysBelowSafeFloor>0?'orange':'mint')}
    </div>

    <div class="section-title"><h3>سبب التقييم</h3><p>لماذا وصل المحرك إلى هذه النتيجة</p></div>
    <div class="insight-list">${reasons}</div>

    <div class="section-title"><h3>الخط الزمني المالي</h3><p>كيف يتحرك رصيدك يومًا بعد يوم</p></div>
    <div class="timeline">${tl}</div>

    ${r.alternatives.length ? `
      <div class="section-title"><h3>البدائل المقترحة</h3><p>اضغط أي بديل لتطبيقه فورًا</p></div>
      <div class="grid auto">${alts}</div>` : ''}

    <div class="hero-actions" style="margin-top:18px">
      <button class="btn outline" data-action="saveDecisionPlan">حفظ كقرار مخطط</button>
      <button class="btn ghost-dark" data-action="proceedAnyway">المتابعة رغم التحذير</button>
    </div>

    <p class="engine-note">
      🔒 كل الأرقام أعلاه محسوبة بواسطة محرك القرار المالي (Deterministic Engine).
      لم يُستخدم الذكاء الاصطناعي في أي حساب.
    </p>`;

  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ───────────────────────────────────────────────────────────────────────
 * تطبيق البدائل
 * ─────────────────────────────────────────────────────────────────── */

function applyAlternative(altId){
  if (!lastAnalysis) return;
  const alt = lastAnalysis.alternatives.find(a => a.id === altId);
  if (!alt) return;

  if (altId === 'cancel'){
    $('#decisionResult').classList.remove('show');
    lastAnalysis = null;
    toast('تم إلغاء القرار');
    return;
  }

  if (altId === 'convert_to_goal'){
    QararStore.addGoal({
      name:          $('#decisionName')?.value || 'هدف ادخار',
      target:        lastAnalysis.input.decisionAmount,
      monthlyAmount: alt.monthlyAmount,
      months:        alt.months
    });
    toast('تم تحويل القرار إلى هدف ادخار ✓');
    $('#decisionResult').classList.remove('show');
    return;
  }

  if (alt.newDate){
    $('#decisionDate').value = alt.newDate;
    toast('تم تعديل التاريخ — جارٍ إعادة التحليل');
  }
  if (alt.newAmount){
    $('#decisionAmount').value = Money.toRiyal(alt.newAmount);
    toast('تم تعديل المبلغ — جارٍ إعادة التحليل');
  }

  // إعادة التحليل بالقيم الجديدة → الأرقام تتغير فعلًا
  setTimeout(runDecisionAnalysis, 350);
}

/* ───────────────────────────────────────────────────────────────────────
 * المساعد المالي
 *
 * ⚠️ ملاحظة صريحة: هذه *ليست* ذكاءً اصطناعيًا حقيقيًا بعد.
 * إنها طبقة تفسير محلية تستدعي محرك القرار وتشرح نتائجه.
 * الميزة الحقيقية: الأرقام التي يعطيها *مطابقة تمامًا* لأرقام
 * النموذج اليدوي، لأن كليهما يستدعي نفس المحرك.
 * سيُستبدل بـOpenAI من جهة الخادم في المرحلة القادمة.
 * ─────────────────────────────────────────────────────────────────── */

/* ───────────────────────────────────────────────────────────────────────
 * شاشة البداية — الانتقال إلى المنصة
 *
 * 🔴 هذه الدالة حُذفت بالخطأ أثناء تعديل المرحلة B، فتعطّل زر
 *    «ابدأ التجربة الآن» تمامًا (ReferenceError).
 *    أُعيدت من نسخة المرحلة A المستقرة، ويحميها الآن اختبار متصفح حقيقي.
 * ─────────────────────────────────────────────────────────────────── */

function startExperience(){
  /* 🐕 (٠) تسليح الـWatchdog فورًا — قبل أي شيء آخر.
   *     مهما فشل ما بعده، سيدخل المستخدم خلال 2.5 ثانية كحد أقصى. */
  window.__startClicked = true;
  armStartupWatchdog();

  try{
    var splash = document.getElementById('splash');
    var btn    = splash ? splash.querySelector('.start-experience-btn') : null;
    var txt    = document.getElementById('loadingText');

    /* (A) تعطيل الزر — منع الضغط المكرر */
    if (btn){
      if (btn.disabled) return;        // ضُغط مسبقًا
      btn.disabled = true;
      btn.style.opacity = '.6';
      btn.style.pointerEvents = 'none';
    }

    /* (B) تغيير النص */
    if (txt) txt.textContent = 'جارٍ تجهيز تجربة منصة قرار...';
    if (splash) splash.classList.add('starting');

    /* (C) انتظار قصير للأنيميشن فقط — ثم (D-G) عبر المصدر الوحيد */
    setTimeout(function(){
      enterAppSafely('normal');        // ← يُنفّذ D · E · F · G
    }, 900);

  }catch(err){
    /* لو فشل حتى هذا — ندخل فورًا بلا انتظار */
    console.error('[Qarar] خطأ في بدء التجربة:', err);
    enterAppSafely('start_error');
  }
}

/* ═══════════════════════════════════════════════════════════════════════
 * واجهة المساعد الذكي
 * ═════════════════════════════════════════════════════════════════════ */

let chatBusy = false;   // منع الرسائل المكررة

function setAgentStatus(text, busy){
  const el = $('#agentStatus');
  if(el){
    el.textContent = text;
    el.className = 'agent-status' + (busy ? ' busy' : '');
  }
}

function bootChat(){
  const m = $('#messages');
  if(!m) return;
  QararAgent.resetConversation();
  const bal = QararStore.getBalance();
  m.innerHTML = '';
  addMsg(`مرحبًا ${esc(QararStore.getProfile().name)} 👋<br><br>
    رصيدك الحالي <b>${riyal(bal)}</b>.<br>
    اكتب أي سؤال مالي بلغتك الطبيعية — مثل «أبغى أشتري لابتوب بـ3000»
    أو «بعت ذهب وجاني 2500».`, 'ai');
  chatBooted = true;

  /* فحص توفر الذكاء الاصطناعي */
  showAIModeBanner('checking');
  QararAgent.probeAvailability().then(st=>{
    showAIModeBanner(st.available ? 'ai' : 'fallback', st);
  });
}

function showAIModeBanner(mode, info){
  const el = $('#aiModeBanner');
  if(!el) return;

  if(mode==='checking'){
    el.innerHTML = `<div class="ai-banner checking">
      <span class="dot-pulse"></span> جارٍ التحقق من المساعد الذكي...
    </div>`;
    return;
  }

  if(mode==='ai'){
    el.innerHTML = `<div class="ai-banner live">
      <span class="ai-ico">✦</span>
      <div><b>المساعد الذكي مفعّل</b>
      <span>يفهم لغتك الطبيعية — والحساب يتم بمحرك القرار.</span></div>
    </div>`;
  }else{
    const why = info?.missingKey
      ? 'مفتاح المزود غير مضبوط على السيرفر.'
      : 'لا يوجد سيرفر يعمل (تشغيل محلي).';
    el.innerHTML = `<div class="ai-banner fallback">
      <span class="ai-ico">⚠️</span>
      <div>
        <b>الوضع الاحتياطي المحدود</b>
        <span>${esc(why)} المساعد الذكي غير متاح الآن، وأعمل بقواعد نصية بسيطة.
        <b>الأرقام تبقى صحيحة</b> — لأن محرك القرار يعمل محليًا.
        للتحليل الكامل استخدم «اختبار القرار».</span>
      </div>
    </div>`;
  }
}

function addMsg(html, who='ai', cls=''){
  const m = $('#messages'); if(!m) return null;
  const div = document.createElement('div');
  div.className = 'msg ' + who + (cls ? ' ' + cls : '');
  if(who === 'user') div.textContent = html;   // 🔒 نص المستخدم — لا HTML (XSS)
  else               div.innerHTML  = html;    // ردودنا نحن (نولّدها بأنفسنا)
  m.appendChild(div);
  m.scrollTop = m.scrollHeight;
  return div;
}
