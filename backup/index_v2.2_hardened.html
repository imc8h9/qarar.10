/* Qarar logo integration update */
.qarar-appicon{
  padding:0 !important;
  overflow:hidden;
  background:transparent !important;
  border:0 !important;
  box-shadow:0 24px 70px rgba(0,0,0,.48) !important;
}
.qarar-appicon.large{
  width:170px !important;
  height:170px !important;
  border-radius:42px !important;
}
.qarar-appicon.small{
  width:74px !important;
  height:74px !important;
  border-radius:22px !important;
}
.brand-logo-img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 18px 28px rgba(0,0,0,.28));
}
.qarar-mark{
  background-image:url("assets/logo.png") !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  color:transparent !important;
  overflow:hidden;
}
.qarar-mark svg{
  opacity:0 !important;
}
.brand-button .qarar-mark,
.qarar-mark.navmark{
  width:58px !important;
  height:58px !important;
  border-radius:18px !important;
  box-shadow:0 14px 32px rgba(0,0,0,.20), inset 0 0 0 1px rgba(255,255,255,.45) !important;
}
.brand-partnership{
  gap:16px !important;
}
.brand-partnership .brand-title{
  font-size:34px;
}
.brand-partnership .alinma-name{
  font-size:30px;
}
.brand-partnership.compact .brand-title,
.brand-partnership.compact .alinma-name{
  font-size:22px;
}
.brand-x{
  color:#FF9A45;
  font-weight:900;
  text-shadow:0 0 18px rgba(255,154,69,.32);
}
.alinma-mark{
  width:38px;
  height:38px;
  border-radius:9px;
  background:linear-gradient(145deg,#7A241D,#4E130F);
  box-shadow:0 14px 28px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.16);
}
.alinma-mark i{
  width:9px;
  height:25px;
  border-radius:2px;
}
.loading-top-branding .brand-partnership{
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.10);
  padding:10px 14px;
  border-radius:22px;
}
@media (max-width:620px){
  .qarar-appicon.large{
    width:140px !important;
    height:140px !important;
    border-radius:34px !important;
  }
  .qarar-appicon.small{
    width:66px !important;
    height:66px !important;
  }
  .brand-partnership .brand-title,
  .brand-partnership .alinma-name{
    font-size:22px !important;
  }
  .brand-partnership.compact .brand-title,
  .brand-partnership.compact .alinma-name{
    font-size:16px !important;
  }
  .alinma-mark{
    width:30px;
    height:30px;
  }
  .alinma-mark i{
    width:7px;
    height:20px;
  }
}


/* Start gate update: user must choose to enter before platform opens */
.app-shell.prelaunch{
  opacity:0;
  transform:scale(.985);
  filter:blur(10px);
  pointer-events:none;
}
.app-shell{
  transition:opacity .65s var(--ease), transform .65s var(--ease), filter .65s var(--ease);
}
.brand-splash-screen{
  justify-content:center !important;
  padding-top:34px !important;
}
.brand-splash-screen .qarar-appicon.large{
  margin-bottom:24px;
  animation:logoFloat 4.2s var(--ease) infinite alternate;
}
@keyframes logoFloat{
  from{transform:translateY(0) scale(1)}
  to{transform:translateY(-8px) scale(1.015)}
}
.start-experience-btn{
  position:relative;
  z-index:2;
  margin-top:22px;
  min-height:58px;
  padding:0 22px 0 16px;
  border-radius:22px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  color:#fff;
  font-weight:900;
  font-size:17px;
  background:linear-gradient(135deg,#6D5DFB 0%,#8E7CFF 55%,#FF9A45 130%);
  box-shadow:0 18px 42px rgba(109,93,251,.32), inset 0 1px 0 rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.16);
  transition:transform .22s var(--ease), box-shadow .22s var(--ease), opacity .22s var(--ease);
}
.start-experience-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 24px 54px rgba(109,93,251,.42), inset 0 1px 0 rgba(255,255,255,.26);
}
.start-experience-btn:active{transform:translateY(0) scale(.97)}
.start-experience-btn i{
  width:34px;
  height:34px;
  border-radius:13px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.18);
  font-style:normal;
}
.start-experience-btn:disabled{
  opacity:.72;
  cursor:default;
  transform:none;
}
#splash .splash-progress{
  opacity:0;
  transform:translateY(8px);
  transition:opacity .35s var(--ease), transform .35s var(--ease);
  max-width:340px;
}
#splash.starting .splash-progress{
  opacity:1;
  transform:translateY(0);
}
#splash.starting .start-experience-btn{
  opacity:0;
  transform:translateY(8px) scale(.98);
  pointer-events:none;
}
#splash.starting .splash-loading-text{
  color:#F4D8BA;
}
.splash-loading-text{
  max-width:390px;
  line-height:1.8;
  margin-left:auto !important;
  margin-right:auto !important;
}
@media (max-width:620px){
  .start-experience-btn{
    min-height:54px;
    width:100%;
    justify-content:center;
    max-width:310px;
  }
  .splash-loading-text{font-size:15px !important;}
}


/* ═══════════════════════════════════════════════════════════════════
 * أنماط جديدة — محرك القرار، Sandbox، البانرات
 * (تستخدم نفس متغيرات الألوان الأصلية — لا تغيير في الهوية)
 * ═══════════════════════════════════════════════════════════════════ */

/* بانر البيئة التجريبية */
.demo-banner{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:20px;
  background:linear-gradient(135deg,rgba(244,162,97,.14),rgba(255,122,89,.10));
  border:1px solid rgba(244,162,97,.35);margin-bottom:16px}
.demo-banner .demo-ico{font-size:20px;flex:0 0 auto}
.demo-banner b{display:block;color:#8A4B22;font-size:14px;margin-bottom:3px}
.demo-banner span{color:var(--muted);font-size:13px;font-weight:600;line-height:1.6}
.demo-note{padding:10px 12px;border-radius:14px;background:rgba(244,162,97,.12);
  color:#8A4B22;font-weight:700;font-size:13px;margin-bottom:12px}

/* لافتة نتيجة القرار */
.result-banner{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:24px;
  background:#fff;box-shadow:var(--shadow2);margin-bottom:6px}
.result-banner h3{font-size:24px;color:var(--ink);letter-spacing:-.5px}
.result-banner p{color:var(--muted);font-weight:600}

/* ملاحظة المحرك */
.engine-note{margin-top:18px;padding:12px 14px;border-radius:16px;
  background:rgba(39,199,168,.10);border:1px solid rgba(39,199,168,.25);
  color:#11806E;font-weight:700;font-size:13px;line-height:1.7}
.engine-note-dark{margin-top:16px;padding:12px 14px;border-radius:16px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.82);font-weight:700;font-size:13px;line-height:1.7}
.engine-steps{display:grid;gap:10px;margin-top:14px}
.engine-steps .insight{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.engine-steps .insight b{color:#fff}
.engine-steps .insight span{color:rgba(255,255,255,.68)}
.engine-steps .bubble{background:rgba(255,255,255,.14);color:#fff}

/* بطاقات البدائل */
.alt-card{text-align:right;transition:.25s var(--ease)}
.alt-card:hover{transform:translateY(-3px);border-color:rgba(109,93,251,.35)}
.alt-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alt-ico{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
  background:rgba(109,93,251,.10);font-size:19px;flex:0 0 auto}
.alt-card p{font-size:14px;line-height:1.65;margin:0 0 10px}

/* بطاقات السيناريوهات */
.scenario-card{text-align:center;transition:.25s var(--ease)}
.scenario-card:hover{transform:translateY(-4px)}
.scenario-ico{display:block;font-size:34px;margin-bottom:8px}
.scenario-card h4{margin:0 0 4px;font-size:16px}
.scenario-card p{margin:0;font-weight:800;color:var(--violet)}

/* بطاقة قرار (Sandbox) */
.qarar-card{background:linear-gradient(145deg,#111A35,#263B68);color:#fff;
  border-color:rgba(255,255,255,.10);min-height:250px;display:flex;flex-direction:column}
.qcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.qcard-brand{font-weight:900;font-size:15px}
.qcard-mode{font-size:11px;font-weight:900;letter-spacing:1.5px;padding:5px 10px;
  border-radius:999px;background:rgba(244,162,97,.22);color:var(--amber);
  border:1px solid rgba(244,162,97,.4)}
.qcard-balance{margin-bottom:auto}
.qcard-balance span{display:block;color:rgba(255,255,255,.60);font-weight:700;font-size:14px}
.qcard-balance b{font-size:40px;letter-spacing:-1.5px;display:block;margin-top:4px}
.qcard-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0 14px}
.qcard-meta small{display:block;color:rgba(255,255,255,.55);font-weight:700;font-size:12px}
.qcard-meta b{font-size:16px}
.qcard-num{font-family:monospace;letter-spacing:3px;color:rgba(255,255,255,.45);font-size:15px}

/* العمليات السريعة */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.quick{padding:12px 8px;border-radius:16px;background:#fff;border:1px solid rgba(20,33,61,.08);
  font-weight:800;font-size:13px;transition:.22s var(--ease)}
.quick:hover{transform:translateY(-2px);border-color:rgba(109,93,251,.35);
  box-shadow:0 12px 24px rgba(16,23,42,.08)}

/* صفوف العمليات */
.tx-row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:18px;
  background:rgba(255,255,255,.72);border:1px solid rgba(20,33,61,.06);margin-bottom:8px}
.tx-ico{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;
  background:var(--sand);font-size:19px;flex:0 0 auto}
.tx-main{flex:1;min-width:0}
.tx-main b{display:block;color:var(--ink);font-size:15px}
.tx-main span{color:var(--muted);font-weight:600;font-size:12.5px}
.tx-amt{font-weight:900;font-size:16px;white-space:nowrap}
.tx-amt.income{color:#11806E}
.tx-amt.expense{color:#C85435}
.tx-del{width:30px;height:30px;border-radius:10px;background:rgba(20,33,61,.05);
  color:var(--muted);font-size:17px;flex:0 0 auto}
.tx-del:hover{background:rgba(255,122,89,.15);color:#C85435}

/* بطاقات الالتزامات */
.obligation-card{text-align:center}

  <script>
  /* ═══════════════════════════════════════════════════════════════════
   * 🛡 شبكة أمان مستقلة تمامًا (Bare Failsafe)
   *
   * هذا السكربت يعمل *قبل* أي ملف خارجي، ولا يعتمد على أي شيء.
   *
   * لماذا؟ لو فشل تحميل أي ملف (src/*.js) — لسبب في الشبكة أو القرص أو
   * قيود المتصفح — فلن يُعرَّف startExperience() إطلاقًا، وسيبقى المستخدم
   * عالقًا للأبد. هذا السكربت يضمن أن الزر يعمل *في كل الأحوال*.
   *
   * التطبيق الكامل سيتجاوزه لاحقًا إن حُمّل بنجاح.
   * ═══════════════════════════════════════════════════════════════════ */
  (function(){
    'use strict';

    /* الدخول القسري — لا يعتمد على أي دالة أو ملف خارجي */
    function bareEnter(why){
      if (window.__qararEntered) return;
      window.__qararEntered = true;
      try{
        var s = document.getElementById('splash');
        if(s){ s.className = 'splash hide'; s.style.display = 'none'; }
      }catch(e){}
      try{
        var l = document.getElementById('loading');
        if(l){ l.className = 'loading hide'; l.style.display = 'none'; }
      }catch(e){}
      try{
        var a = document.querySelector('.app-shell');
        if(a) a.classList.remove('prelaunch');
      }catch(e){}
      console.warn('[Qarar] 🛡 دخول عبر شبكة الأمان المستقلة. السبب: ' + why);
    }

    window.__bareEnter = bareEnter;

    /* الزر يعمل حتى لو لم يُحمّل أي ملف خارجي */
    document.addEventListener('DOMContentLoaded', function(){
      var btn = document.querySelector('.start-experience-btn');
      if(!btn) return;

      btn.addEventListener('click', function(){
        window.__startClicked = true;

        /* لو التطبيق الكامل جاهز → دعه يتولى الأمر (تجربة كاملة بالأنيميشن) */
        if (typeof window.startExperience === 'function') return;

        /* 🔴 التطبيق لم يُحمَّل — ندخل قسرًا بدل ترك المستخدم عالقًا */
        console.error('[Qarar] 🔴 التطبيق لم يُحمَّل — دخول بالحد الأدنى.');
        bareEnter('scripts_failed');
      });
    });

    /* 🐕 حارس مستقل: لو ضُغط الزر ولم يدخل خلال 3 ثوانٍ → دخول قسري.
       يعمل حتى لو تعطّل الـWatchdog الرئيسي. */
    var bareTimer = setInterval(function(){
      if (window.__qararEntered){ clearInterval(bareTimer); return; }
      if (window.__startClicked){
        if (!window.__bareDeadline) {
          window.__bareDeadline = Date.now() + 1500;
        } else if (Date.now() > window.__bareDeadline){
          bareEnter('bare_watchdog');
        }
      }
    }, 250);
  })();
  </script>

window.__qararErrors = [];

window.__watchdogTimer = null;

/* ═══════════════════════════════════════════════════════════════════════
 * ⭐ enterAppSafely() — المصدر الوحيد لدخول المنصة
 *
 * كل مسارات الدخول تمرّ من هنا. لا تكرار للمنطق في أي مكان آخر.

 * قواعد صارمة:
 *   1. لا يعتمد على أي شيء خارجي (لا AI · لا شبكة · لا localStorage · لا خطوط).
 *   2. كل خطوة معزولة في try/catch — فشل خطوة لا يمنع البقية.
 *   3. آمن للاستدعاء أكثر من مرة (idempotent).
 *   4. حتى لو فشل كل شيء، يُزيل الطبقات الحاجبة قسرًا.
 * ═══════════════════════════════════════════════════════════════════════ */

function enterAppSafely(reason){
  /* منع التنفيذ المزدوج */
  if (window.__qararEntered) return true;
  window.__qararEntered = true;

  if (window.__watchdogTimer) {
    clearTimeout(window.__watchdogTimer);
    window.__watchdogTimer = null;
  }

  var recovered = (reason && reason !== 'normal');

  /* ── (١) إخفاء شاشة البداية ── */
  try {
    var sp = document.getElementById('splash');
    if (sp) {
      sp.classList.add('hide');
      sp.style.display = 'none';        // احتياطي قسري — لا يعتمد على CSS
    }
  } catch(e){ console.error('[Qarar] تعذر إخفاء splash', e); }

  /* ── (٢) إخفاء شاشة التحميل ── */
  try {
    var ld = document.getElementById('loading');
    if (ld) {
      ld.classList.add('hide');
      ld.style.display = 'none';        // احتياطي قسري
    }
  } catch(e){ console.error('[Qarar] تعذر إخفاء loading', e); }

  /* ── (٣) إزالة prelaunch ── */
  try {
    var shell = document.querySelector('.app-shell');
    if (shell) shell.classList.remove('prelaunch');
  } catch(e){ console.error('[Qarar] تعذر إزالة prelaunch', e); }

  /* ── (٤) رسم لوحة التحكم (لو لم تُرسم بعد) ── */
  try {
    var v = document.getElementById('view');
    if (v && v.innerHTML.trim().length < 50) {
      if (typeof views !== 'undefined' && views.home) {
        v.innerHTML = views.home();
        if (typeof afterRender === 'function') afterRender('home');
      } else {
        /* حتى لو فشل كل شيء — المستخدم يرى شيئًا، لا شاشة سوداء */
        v.innerHTML = '<div class="card"><h4>منصة قرار</h4>'
          + '<p>تعذر تحميل لوحة التحكم بالكامل. جرّب تحديث الصفحة (F5).</p></div>';
      }
    }
  } catch(e){
    console.error('[Qarar] تعذر رسم لوحة التحكم', e);
    try {
      document.getElementById('view').innerHTML =
        '<div class="card"><h4>منصة قرار</h4><p>حدث خطأ في العرض. حدّث الصفحة (F5).</p></div>';
    } catch(_){}
  }

  /* ── (٥) إشعار ── */
  try {
    if (recovered) {
      console.warn('[Qarar] 🛡 الدخول بوضع الاسترداد. السبب:', reason);
      if (typeof toast === 'function') {
        toast('دخلت المنصة بوضع الاسترداد — بعض الميزات قد تكون محدودة');
      }
    } else if (typeof toast === 'function') {
      toast('مرحبًا بك في منصة قرار');
    }
  } catch(e){}

  console.log('[Qarar] ✓ دخل المستخدم المنصة' + (recovered ? ' (استرداد: ' + reason + ')' : ''));
  return true;
}

/* ═══════════════════════════════════════════════════════════════════════
 * 🐕 Startup Watchdog — لا Loading أبدي، إطلاقًا
 *
 * يبدأ عند الضغط على زر البداية. إن لم يكتمل الدخول خلال 2.5 ثانية
 * لأي سبب كان → يدخل المستخدم قسرًا.
 * ═══════════════════════════════════════════════════════════════════════ */

function armStartupWatchdog(){
  if (window.__watchdogTimer) clearTimeout(window.__watchdogTimer);
  window.__watchdogTimer = setTimeout(function(){
    if (!window.__qararEntered) {
      console.error('[Qarar] 🐕 Watchdog: لم يكتمل الدخول خلال 2.5 ثانية — دخول قسري.');
      enterAppSafely('watchdog_timeout');
    }
  }, 2500);
}

/* ═══════════════════════════════════════════════════════════════════════
 * 🛡 حدود الأخطاء
 * ═══════════════════════════════════════════════════════════════════════ */

window.__bootFailed = false;

window.addEventListener('error', function(ev){
  window.__qararErrors.push(String(ev.message || ev.error));
  console.error('[Qarar] خطأ:', ev.error || ev.message);

  /* نُعلّم أن التمهيد فشل — حتى لو حدث الخطأ قبل الضغط على الزر */
  window.__bootFailed = true;

  /* لو ضُغط الزر والمستخدم ما زال عالقًا → أدخله فورًا */
  if (!window.__qararEntered && window.__startClicked) {
    enterAppSafely('js_error');
  }
});

window.addEventListener('unhandledrejection', function(ev){
  window.__qararErrors.push(String(ev.reason));
  console.error('[Qarar] وعد مرفوض:', ev.reason);
  /* 🔴 فشل AI / الشبكة لا يُسقِط التطبيق أبدًا */
  ev.preventDefault();
});

/* شبكة أمان نهائية: لو مرّت 6 ثوانٍ من تحميل الصفحة والمستخدم ضغط الزر
   ولم يدخل بعد (حالة مستحيلة نظريًا) → دخول قسري. */
window.addEventListener('load', function(){
  setTimeout(function(){
    if (window.__startClicked && !window.__qararEntered) {
      console.error('[Qarar] 🛡 شبكة الأمان النهائية — دخول قسري.');
      enterAppSafely('final_safety_net');
    }
  }, 6000);
});

function lineChart(values, color='#6D5DFB'){
  const max = Math.max(...values), min = Math.min(...values);
  const pts = values.map((v,i)=>{
    const x = 20 + i*(320/(values.length-1));
    const y = 150 - ((v-min)/(max-min || 1))*110;
    return [x,y];
  });
  const d = pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' ');
  const area = `${d} L340,165 L20,165 Z`;
  return `<svg class="line-chart" viewBox="0 0 360 190" preserveAspectRatio="none">
    <defs><linearGradient id="lg${Math.random().toString(36).slice(2)}" x1="0" x2="0" y1="0" y2="1"><stop stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path class="area" d="${area}" fill="rgba(109,93,251,.13)"/>
    <path class="line" d="${d}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#fff" stroke="${color}" stroke-width="3"/>`).join('')}
  </svg>`;
}
function bars(vals){
  const max = Math.max(...vals);
  return `<div class="bars">${vals.map(v=>`<i class="bar" style="height:${Math.max(20, v/max*150)}px"></i>`).join('')}</div>`;
}

  bills(){
    const snap = QararStore.getSnapshot();
    const forecasts = snap.billForecasts;
    const rawObs = QararStore.getObligations();

    const billCards = forecasts.map(f=>{
      const hist = f.history.slice().reverse();
      const bill = snap.variableBills.find(b=>b.id===f.billId);
      return `
      <div class="card bill-card">
        <div class="bill-head">
          <span class="ob-ico">${bill.icon}</span>
          <div>
            <h4>${esc(f.title)}</h4>
            <span class="pill ${f.isManual?'orange':'mint'}">
              ${f.isManual?'تعديل يدوي':'توقع محسوب — ثقة '+f.confidenceAr}
            </span>
          </div>
        </div>

        <div class="bill-expected">
          <small>القيمة التي يستخدمها المحرك</small>
          <b>${riyal(f.expectedMinor)}</b>
          ${!f.isManual && f.rangeLowMinor!==f.rangeHighMinor
            ? `<span class="bill-range">نطاق متوقع: ${riyal(f.rangeLowMinor)} — ${riyal(f.rangeHighMinor)}</span>`
            : ''}
        </div>

        <p class="bill-note">${esc(f.note)}</p>

        ${!f.isManual && f.entryCount>0 ? `
        <div class="bill-stats">
          <div><small>آخر مبلغ</small><b>${riyal(f.lastMinor)}</b></div>
          <div><small>المتوسط</small><b>${riyal(f.averageMinor)}</b></div>
          <div><small>الوسيط</small><b>${riyal(f.medianMinor)}</b></div>
          <div><small>الأدنى</small><b>${riyal(f.minMinor)}</b></div>
          <div><small>الأعلى</small><b>${riyal(f.maxMinor)}</b></div>
          <div><small>الاتجاه</small><b>${f.trendAr}</b></div>
        </div>` : ''}

        ${hist.length ? `
        <div class="bill-hist-label">السجل الشهري</div>
        <div class="bill-hist">
          ${hist.map(h=>`
            <div class="hist-row">
              <span>${esc(h.billingPeriod)}</span>
              <b>${riyal(h.amountMinor)}</b>
            </div>`).join('')}
        </div>` : ''}

        <div class="hero-actions">
          <button class="btn primary" data-action="editBillForecast" data-bill="${f.billId}">
            تعديل القيمة المتوقعة
          </button>
          <button class="btn outline" data-action="addBillEntry" data-bill="${f.billId}">
            + قراءة شهر
          </button>
          ${f.isManual ? `<button class="btn ghost-dark" data-action="clearManual" data-bill="${f.billId}">
            استخدم التوقع المحسوب
          </button>` : ''}
        </div>
      </div>`;
    }).join('');

    const obRows = rawObs.map(o=>`
      <div class="tx-row">
        <span class="tx-ico">${o.icon}</span>
        <div class="tx-main">
          <b>${esc(o.title)}</b>
          <span>${DateU.formatArabic(o.nextDueDate)} · ${o.essentiality==='essential'?'أساسي':'اختياري'}
            ${o.settled?' · <b style="color:#11806E">مدفوع ✓</b>':''}</span>
        </div>
        <span class="tx-amt expense">${riyal(o.amountMinor)}</span>
        <div class="tx-acts">
          <button class="tx-btn" data-action="editObligation" data-id="${o.id}" title="تعديل">✎</button>
        </div>
      </div>`).join('');

    return `
    ${pageHero('الالتزامات والفواتير', 'كل تعديل هنا يُعيد حساب محرك القرار فورًا.', '▤')}
    ${demoBanner()}

    <div class="section-title">

    <div class="section-title"><h3>الالتزامات الثابتة</h3><p>مبالغ ثابتة متكررة</p></div>

/** 🔒 تهريب HTML — يمنع حقن الكود عبر أسماء العمليات (XSS) */
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════════════════════════
 * محرك القرار — الربط الحقيقي
 * كل رقم هنا يأتي من QararEngine. لا معادلات تجميلية. لا أرقام مكتوبة.
 * ═════════════════════════════════════════════════════════════════════ */

/* 🛡 محصّن: لو فشل تحميل decision-engine.js، لا نُسقِط السكربت كله.
 * (سابقًا: هذا السطر كان يرمي ReferenceError فيتوقف كل ما بعده —
 *  بما فيه مُفوِّض الأحداث والتمهيد — فيبقى المستخدم عالقًا.) */
const Money = (typeof QararEngine !== 'undefined' && QararEngine.Money)
  ? QararEngine.Money
  : { fromRiyal:function(r){return Math.round(r*100);},
      toRiyal:function(h){return h/100;},
      format:function(h){return String(h/100);},
      formatWithCurrency:function(h){return (h/100)+' ر.س';} };

const DateU = (typeof QararEngine !== 'undefined' && QararEngine.DateUtil)
  ? QararEngine.DateUtil
  : { formatArabic:function(d){return String(d);},
      addDays:function(d){return d;}, diffDays:function(){return 0;},
      toDayNumber:function(){return 0;}, fromDayNumber:function(){return '';} };

let lastAnalysis = null;   // آخر نتيجة تحليل (للبدائل)

/** تنسيق مبلغ بالهللة → نص عربي */
function riyal(halala){ return Money.formatWithCurrency(halala); }

/** لون حسب مستوى الخطر */
function riskColor(level){
  return level === 'critical' ? '#DC2626'
       : level === 'high'     ? '#FF7A59'
       : level === 'medium'   ? '#F4A261'
       :                        '#27C7A8';
}
function riskPillClass(level){
  return (level === 'critical' || level === 'high') ? 'orange'
       : level === 'medium' ? 'orange' : 'mint';
}

/* ───────────────────────────────────────────────────────────────────────
 * تحليل القرار — يستدعي المحرك الحقيقي
 * ─────────────────────────────────────────────────────────────────── */

function runDecisionAnalysis(){
  const name        = $('#decisionName')?.value?.trim() || 'قرار جديد';
  const type        = $('#decisionType')?.value || 'purchase';
  const amountRiyal = Number($('#decisionAmount')?.value || 0);
  const targetDate  = $('#decisionDate')?.value || QararDemo.TODAY;
  const essential   = $('#decisionEssential')?.value === 'yes';
  const payMode     = $('#decisionPayMode')?.value || 'one_time';
  const months      = Number($('#decisionMonths')?.value || 6);

  if (!amountRiyal || amountRiyal <= 0){
    toast('أدخل مبلغًا صحيحًا أكبر من صفر');
    return;
  }

  // بناء المُدخل من الحالة الفعلية المحفوظة (لا من أرقام ثابتة)
  const input = QararStore.buildEngineInput({
    type:        type,
    name:        name,
    amount:      Money.fromRiyal(amountRiyal),   // ريال → هللة
    targetDate:  targetDate,
    isEssential: essential,
    paymentMode: payMode,
    months:      months
  });

  // ⭐ استدعاء المحرك
  const result = QararEngine.analyzeDecision(input);

  if (!result.ok){
    $('#decisionResult').innerHTML =
      `<h4>تعذر التحليل</h4><ul>${result.errors.map(e=>`<li>${e}</li>`).join('')}</ul>`;
    $('#decisionResult').classList.add('show');
    return;
  }

  lastAnalysis = result;
  renderDecisionResult(result);
}

/* ───────────────────────────────────────────────────────────────────────
 * عرض نتيجة التحليل
 * ─────────────────────────────────────────────────────────────────── */

function renderDecisionResult(r){
  const el = $('#decisionResult');
  const color = riskColor(r.riskLevel);
  const below = r.gapFromSafeFloor < 0;

  const reasons = r.riskReasons.map(x =>
    `<div class="insight"><span class="bubble">${below?'⚠️':'✓'}</span><div><span>${x.text}</span></div></div>`
  ).join('');

  const alts = r.alternatives.map(a => `
    <button class="card alt-card" data-action="applyAlt" data-alt="${a.id}">
      <div class="alt-head"><span class="alt-ico">${a.icon}</span><b>${a.title}</b></div>
      <p>${a.description}</p>
      <span class="pill ${a.id==='cancel'?'':'mint'}">${a.impact}</span>
    </button>`).join('');

  // الخط الزمني حتى الراتب
  const tl = r.timeline.slice(0, 8).map(t => `
    <div class="timeline-item">
      <div class="timeline-dot">${t.icon}</div>
      <div class="timeline-box">
        <b>${DateU.formatArabic(t.date)} — ${t.label}</b>
        <span>${t.amount < 0 ? '−' : '+'}${riyal(Math.abs(t.amount))}
          &nbsp;·&nbsp; الرصيد بعدها:
          <b style="color:${t.balanceAfter < r.safeFloor ? '#DC2626' : '#11806E'}">
            ${riyal(t.balanceAfter)}
          </b>
        </span>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="result-banner" style="border-right:6px solid ${color}">
      <div>
        <span class="pill ${riskPillClass(r.riskLevel)}">مستوى الخطر: ${r.riskLevelAr}</span>
        <h3 style="margin:10px 0 4px">${r.recommendationAr}</h3>
        <p style="margin:0">التحليل مبني على رصيدك والتزاماتك القادمة وموعد راتبك.</p>
      </div>
    </div>

    <div class="grid four" style="margin-top:16px">
      ${metric('الرصيد الحالي', riyal(r.currentBalance), 'قبل القرار', 'violet')}
      ${metric('الرصيد بعد القرار', riyal(r.balanceAfterDecision), 'مباشرة بعد الدفع', 'orange')}
      ${metric('⭐ أقل رصيد متوقع', riyal(r.minimumBalance),
               DateU.formatArabic(r.minimumBalanceDate), below?'orange':'mint')}
      ${metric('الفرق عن الحد الآمن', riyal(r.gapFromSafeFloor),
               below?'تحت الحد الآمن':'فوق الحد الآمن', below?'orange':'mint')}
    </div>

    <div class="grid four" style="margin-top:14px">
      ${metric('الالتزامات قبل الراتب', riyal(r.obligationsBeforeSalary), 'فواتير واشتراكات','violet')}
      ${metric('حدك الآمن', riyal(r.safeFloor), 'الذي حددته أنت','violet')}
      ${metric('⭐ أقصى مبلغ آمن الآن', riyal(r.safeMaximumAmount), 'يمكنك دفعه دون خطر','mint')}
      ${metric('أيام تحت الحد الآمن', r.daysBelowSafeFloor.toLocaleString('ar-SA'), 'خلال الفترة القادمة',
               r.daysBelowSafeFloor>0?'orange':'mint')}
    </div>

    <div class="section-title"><h3>سبب التقييم</h3><p>لماذا وصل المحرك إلى هذه النتيجة</p></div>
    <div class="insight-list">${reasons}</div>

    <div class="section-title"><h3>الخط الزمني المالي</h3><p>كيف يتحرك رصيدك يومًا بعد يوم</p></div>
    <div class="timeline">${tl}</div>

    ${r.alternatives.length ? `
      <div class="section-title"><h3>البدائل المقترحة</h3><p>اضغط أي بديل لتطبيقه فورًا</p></div>
      <div class="grid auto">${alts}</div>` : ''}

    <div class="hero-actions" style="margin-top:18px">
      <button class="btn outline" data-action="saveDecisionPlan">حفظ كقرار مخطط</button>
      <button class="btn ghost-dark" data-action="proceedAnyway">المتابعة رغم التحذير</button>
    </div>

    <p class="engine-note">
      🔒 كل الأرقام أعلاه محسوبة بواسطة محرك القرار المالي (Deterministic Engine).
      لم يُستخدم الذكاء الاصطناعي في أي حساب.
    </p>`;

  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ───────────────────────────────────────────────────────────────────────
 * تطبيق البدائل
 * ─────────────────────────────────────────────────────────────────── */

function applyAlternative(altId){
  if (!lastAnalysis) return;
  const alt = lastAnalysis.alternatives.find(a => a.id === altId);
  if (!alt) return;

  if (altId === 'cancel'){
    $('#decisionResult').classList.remove('show');
    lastAnalysis = null;
    toast('تم إلغاء القرار');
    return;
  }

  if (altId === 'convert_to_goal'){
    QararStore.addGoal({
      name:          $('#decisionName')?.value || 'هدف ادخار',
      target:        lastAnalysis.input.decisionAmount,
      monthlyAmount: alt.monthlyAmount,
      months:        alt.months
    });
    toast('تم تحويل القرار إلى هدف ادخار ✓');
    $('#decisionResult').classList.remove('show');
    return;
  }

  if (alt.newDate){
    $('#decisionDate').value = alt.newDate;
    toast('تم تعديل التاريخ — جارٍ إعادة التحليل');
  }
  if (alt.newAmount){
    $('#decisionAmount').value = Money.toRiyal(alt.newAmount);
    toast('تم تعديل المبلغ — جارٍ إعادة التحليل');
  }

  // إعادة التحليل بالقيم الجديدة → الأرقام تتغير فعلًا
  setTimeout(runDecisionAnalysis, 350);
}

/* ───────────────────────────────────────────────────────────────────────
 * المساعد المالي
 *
 * ⚠️ ملاحظة صريحة: هذه *ليست* ذكاءً اصطناعيًا حقيقيًا بعد.
 * إنها طبقة تفسير محلية تستدعي محرك القرار وتشرح نتائجه.
 * الميزة الحقيقية: الأرقام التي يعطيها *مطابقة تمامًا* لأرقام
 * النموذج اليدوي، لأن كليهما يستدعي نفس المحرك.
 * سيُستبدل بـOpenAI من جهة الخادم في المرحلة القادمة.
 * ─────────────────────────────────────────────────────────────────── */

/* ───────────────────────────────────────────────────────────────────────
 * شاشة البداية — الانتقال إلى المنصة
 *
 * 🔴 هذه الدالة حُذفت بالخطأ أثناء تعديل المرحلة B، فتعطّل زر
 *    «ابدأ التجربة الآن» تمامًا (ReferenceError).
 *    أُعيدت من نسخة المرحلة A المستقرة، ويحميها الآن اختبار متصفح حقيقي.
 * ─────────────────────────────────────────────────────────────────── */

function startExperience(){
  /* 🐕 (٠) تسليح الـWatchdog فورًا — قبل أي شيء آخر.
   *     مهما فشل ما بعده، سيدخل المستخدم خلال 2.5 ثانية كحد أقصى. */
  window.__startClicked = true;
  armStartupWatchdog();

  try{
    var splash = document.getElementById('splash');
    var btn    = splash ? splash.querySelector('.start-experience-btn') : null;
    var txt    = document.getElementById('loadingText');

    /* (A) تعطيل الزر — منع الضغط المكرر */
    if (btn){
      if (btn.disabled) return;        // ضُغط مسبقًا
      btn.disabled = true;
      btn.style.opacity = '.6';
      btn.style.pointerEvents = 'none';
    }

    /* (B) تغيير النص */
    if (txt) txt.textContent = 'جارٍ تجهيز تجربة منصة قرار...';
    if (splash) splash.classList.add('starting');

    /* (C) انتظار قصير للأنيميشن فقط — ثم (D-G) عبر المصدر الوحيد */
    setTimeout(function(){
      enterAppSafely('normal');        // ← يُنفّذ D · E · F · G
    }, 900);

  }catch(err){
    /* لو فشل حتى هذا — ندخل فورًا بلا انتظار */
    console.error('[Qarar] خطأ في بدء التجربة:', err);
    enterAppSafely('start_error');
  }
}

    اكتب أي سؤال مالي بلغتك الطبيعية — مثل «أبغى أشتري لابتوب بـ3000»

  chatBooted = true;

  /* فحص توفر الذكاء الاصطناعي */
  showAIModeBanner('checking');
  QararAgent.probeAvailability().then(st=>{
    showAIModeBanner(st.available ? 'ai' : 'fallback', st);
  });
}

function showAIModeBanner(mode, info){
  const el = $('#aiModeBanner');
  if(!el) return;

  if(mode==='checking'){
    el.innerHTML = `<div class="ai-banner checking">
      <span class="dot-pulse"></span> جارٍ التحقق من المساعد الذكي...
    </div>`;
    return;
  }

  if(mode==='ai'){
    el.innerHTML = `<div class="ai-banner live">
      <span class="ai-ico">✦</span>
      <div><b>المساعد الذكي مفعّل</b>
      <span>يفهم لغتك الطبيعية — والحساب يتم بمحرك القرار.</span></div>
    </div>`;
  }else{
    const why = info?.missingKey
      ? 'مفتاح المزود غير مضبوط على السيرفر.'
      : 'لا يوجد سيرفر يعمل (تشغيل محلي).';
    el.innerHTML = `<div class="ai-banner fallback">
      <span class="ai-ico">⚠️</span>
      <div>
        <b>الوضع الاحتياطي المحدود</b>
        <span>${esc(why)} المساعد الذكي غير متاح الآن، وأعمل بقواعد نصية بسيطة.
        <b>الأرقام تبقى صحيحة</b> — لأن محرك القرار يعمل محليًا.
        للتحليل الكامل استخدم «اختبار القرار».</span>
      </div>
    </div>`;
  }
}

function addMsg(html, who='ai', cls=''){
  const m = $('#messages'); if(!m) return null;
  const div = document.createElement('div');
  div.className = 'msg ' + who + (cls ? ' ' + cls : '');
  if(who === 'user') div.textContent = html;   // 🔒 نص المستخدم — لا HTML (XSS)
  else               div.innerHTML  = html;    // ردودنا نحن (نولّدها بأنفسنا)
  m.appendChild(div);
  m.scrollTop = m.scrollHeight;
  return div;
}

/** بطاقة التحليل داخل المحادثة */
function analysisCard(r, decision){
  const below = r.gapFromSafeFloor < 0;
  const color = riskColor(r.riskLevel);

  const alts = r.alternatives.slice(0,3).map(a=>
    `<button class="ac-alt" data-action="applyAltChat" data-alt="${a.id}">
       ${a.icon} ${esc(a.title)}
     </button>`).join('');

  return `
  <div class="analysis-card" style="border-right:5px solid ${color}">
    <div class="ac-head">
      <span class="pill ${riskPillClass(r.riskLevel)}">${r.riskLevelAr}</span>
      <b>${decision ? esc(decision.name) : 'وضعك المالي'}</b>
    </div>

    <div class="ac-grid">
      <div><small>الرصيد الحالي</small><b>${riyal(r.currentBalance)}</b></div>
      ${decision ? `<div><small>بعد القرار</small><b>${riyal(r.balanceAfterDecision)}</b></div>` : ''}
      <div><small>الالتزامات القادمة</small><b>${riyal(r.obligationsBeforeSalary)}</b></div>
      <div class="${below?'ac-bad':'ac-good'}">
        <small>⭐ أقل رصيد متوقع</small>
        <b>${riyal(r.minimumBalance)}</b>
        <em>${DateU.formatArabic(r.minimumBalanceDate)}</em>
      </div>
      <div><small>حدك الآمن</small><b>${riyal(r.safeFloor)}</b></div>
      <div class="ac-good"><small>⭐ أقصى مبلغ آمن</small><b>${riyal(r.safeMaximumAmount)}</b></div>
    </div>

    ${r.riskReasons.length ? `
      <div class="ac-reason">${below?'⚠️':'✓'} ${esc(r.riskReasons[0].text)}</div>` : ''}

    <div class="ac-rec"><b>التوصية:</b> ${r.recommendationAr}</div>

    ${alts ? `<div class="ac-alts">${alts}</div>` : ''}

    <div class="ac-foot">🔒 محسوب بمحرك القرار — نفس أرقام «اختبار القرار».</div>
  </div>`;
}

/* ⭐ إرسال رسالة */
async function sendChat(text){
  if(chatBusy) return;                       // منع الرسائل المكررة
  const q = text || $('#chatText')?.value?.trim();
  if(!q) return;

  chatBusy = true;
  const input = $('#chatText');
  if(input){ input.value=''; input.disabled = true; }

  addMsg(q, 'user');

  const typing = addMsg('<span class="dot-pulse"></span> يفكر...', 'ai', 'typing');
  setAgentStatus('يفكر...', true);

  try{
    const out = await QararAgent.processMessage(q, {
      onStage(stage){
        if(!typing) return;
        const map = {
          thinking:  'يفكر...',
          understood:'يجمع البيانات...',
          analyzing: 'يحلّل القرار بالمحرك...',
          awaiting_confirmation:'ينتظر تأكيدك...',
          fallback:  'الوضع الاحتياطي...'
        };
        const t = map[stage];
        if(t){
          typing.innerHTML = `<span class="dot-pulse"></span> ${t}`;
          setAgentStatus(t, true);
        }
      }
    });

    typing?.remove();

    /* تحديث لافتة الوضع */
    showAIModeBanner(QararAgent.getMode()==='ai' ? 'ai' : 'fallback',
                     {missingKey:false});

    if(out.type === 'analysis'){
      addMsg(esc(out.reply), 'ai');
      const e = out.engine;
      addMsg(analysisCard(e.result, e.decision), 'ai', 'wide');
    }
    else if(out.type === 'confirmation'){
      addMsg(esc(out.reply), 'ai');
      addMsg(confirmCard(out.draft), 'ai', 'wide');
    }
    else{
      addMsg(esc(out.reply).replace(/\n/g,'<br>'), 'ai');
    }

  }catch(err){
    typing?.remove();
    addMsg('تعذر تشغيل المساعد. استخدم نموذج «اختبار القرار» للتحليل الكامل.', 'ai');
  }finally{
    chatBusy = false;
    setAgentStatus('جاهز', false);
    if(input){ input.disabled = false; input.focus(); }
  }
}

/* ───────────────────────────────────────────────────────────────────────
 * إعادة الحساب المركزية
 * أي تعديل في البيانات → تُعاد الصفحة الحالية → كل الأرقام تتحدث
 * ─────────────────────────────────────────────────────────────────── */

function refreshCurrentView(){
  const el = $('#view');
  if(!el || !views[currentView]) return;
  el.innerHTML = views[currentView]();
  afterRender(currentView);
}

/* الاشتراك في المتجر: أي Mutation → إعادة رسم الصفحة الحالية
 * 🛡 محصّن: لو فشل تحميل data-store.js، لا نُسقِط السكربت كله. */
try{
  if (typeof QararStore !== 'undefined' && QararStore.subscribe) {
    QararStore.subscribe(function(){ refreshCurrentView(); });
  } else {
    console.warn('[Qarar] QararStore غير متاح — لن تتحدث الصفحات تلقائيًا.');
  }
}catch(e){ console.error('[Qarar] تعذر الاشتراك في المتجر:', e); }

/* ───────────────────────────────────────────────────────────────────────
 * معالج الإجراءات
 * ─────────────────────────────────────────────────────────────────── */

function handleAction(action, el){
  if(action==='startExperience') { startExperience(); return; }
  if(action==='closeSheet') { closeSheet(); return; }

  /* ── محرك القرار ── */
  if(action==='simulateDecision'){
    showLoading('جارٍ تحليل أثر القرار...');
    setTimeout(()=>{ hideLoading(); runDecisionAnalysis(); }, 550);
  }
  if(action==='applyAlt') applyAlternative(el.dataset.alt);

  if(action==='scenario'){
    $('#decisionName').value      = el.dataset.title;
    $('#decisionAmount').value    = el.dataset.amount;
    $('#decisionType').value      = el.dataset.type;
    $('#decisionEssential').value = el.dataset.essential === 'true' ? 'yes' : 'no';
    toast(`تم اختيار: ${el.dataset.title}`);
    window.scrollTo({top:0, behavior:'smooth'});
  }

  if(action==='saveDecisionPlan'){
    if(!lastAnalysis) return;
    QararStore.savePlannedDecision({
      name: $('#decisionName').value,
      type: $('#decisionType').value,
      amount: lastAnalysis.input.decisionAmount,
      targetDate: $('#decisionDate').value,
      isEssential: $('#decisionEssential').value==='yes',
      paymentMode: $('#decisionPayMode').value,
      months: Number($('#decisionMonths')?.value || 0)
    }, lastAnalysis);
    toast('حُفظ كقرار مخطط — لم يُخصم من رصيدك ✓');
  }

  if(action==='proceedAnyway'){
    if(!lastAnalysis) return;
    openSheet(`
      <h3>⚠️ تأكيد المتابعة رغم التحذير</h3>
      <p>مستوى الخطر: <b>${lastAnalysis.riskLevelAr}</b></p>
      <p>سيتبقى لديك <b>${riyal(lastAnalysis.minimumBalance)}</b> عند
         ${DateU.formatArabic(lastAnalysis.minimumBalanceDate)} —
         أقل من حدك الآمن (${riyal(lastAnalysis.safeFloor)}).</p>
      <p>هذا يعني أن القرار سيُنفَّذ ويُخصم من رصيدك فعلًا.</p>
      <div class="hero-actions">
        <button class="btn orange" data-action="confirmExecute">نعم، نفّذ القرار</button>
        <button class="btn outline" data-action="closeSheet">تراجع</button>
      </div>`);
  }

  /* ⭐ تنفيذ القرار → يتحول إلى Transaction (يُخصم مرة واحدة فقط) */
  if(action==='confirmExecute'){
    if(!lastAnalysis) return;
    try{
      const rec = QararStore.savePlannedDecision({
        name: $('#decisionName')?.value || 'قرار',
        type: $('#decisionType')?.value || 'purchase',
        amount: lastAnalysis.input.decisionAmount,
        targetDate: $('#decisionDate')?.value || QararStore.getProfile().asOfDate,
        isEssential: false, paymentMode:'one_time'
      }, lastAnalysis);
      QararStore.executeDecision(rec.id);
      closeSheet();
      toast('نُفّذ القرار — خُصم من رصيدك ✓');
      lastAnalysis = null;
    }catch(e){
      closeSheet();
      toast(e.message==='ALREADY_EXECUTED' ? 'القرار منفّذ مسبقًا' : 'تعذر التنفيذ');
    }
  }

  /* ── Sandbox: إضافة عملية (دخل أو مصروف) ── */
  if(action==='openAddTx'){
    const kind   = el.dataset.kind || 'expense';
    const preset = el.dataset.preset || '';
    const amt    = el.dataset.amount || '';
    openSheet(txForm({kind, title:preset, merchant:preset, amount:amt}));

  if(action==='editTx'){
    const t = QararStore.getTransaction(el.dataset.id);

  if(action==='saveTx'){

    const snap = QararStore.getSnapshot();
    openSheet(`<h3>تنبيهات قرار</h3><div class="insight-list">
      ${insight('💰','رصيدك الحالي', riyal(snap.balanceMinor))}
      ${snap.obligations.slice(0,3).map(o=>insight(o.icon, esc(o.name),
        `${riyal(o.amount)} — ${DateU.formatArabic(o.dueDate)}`)).join('')}
    </div>`);
  }
  if(action==='sendChat') sendChat();

  /* ── تأكيد/إلغاء مسودة المساعد ── */
  if(action==='agentConfirm'){
    const res = QararAgent.confirmDraft();
    if(res.ok){
      addMsg(`✓ ${esc(res.message)}`, 'ai', 'success');
      toast('تم الحفظ ✓');
    }else{
      addMsg('تعذر الحفظ: ' + esc(res.error||''), 'ai');
    }
    el.closest('.confirm-card')?.classList.add('done');
  }
  if(action==='agentCancel'){
    QararAgent.cancelDraft();
    addMsg('تم الإلغاء — لم يُحفظ شيء.', 'ai');
    el.closest('.confirm-card')?.classList.add('done');
  }
  if(action==='agentEdit'){
    QararAgent.cancelDraft();
    el.closest('.confirm-card')?.classList.add('done');
    addMsg('تمام — اكتب التعديل، مثل «خله 2200» أو «بعد الراتب».', 'ai');
  }
  if(action==='applyAltChat'){
    const alt = el.dataset.alt;
    const msg = alt==='delay_to_salary' ? 'أجّله إلى ما بعد الراتب'
              : alt==='reduce_amount'   ? 'قلّل المبلغ إلى الحد الآمن'
              : alt==='convert_to_goal' ? 'حوّله إلى هدف ادخار'
              : alt==='cancel'          ? 'ألغِ القرار'
              : 'وش أفضل موعد؟';
    sendChat(msg);
  }
  if(action==='toggle') el.classList.toggle('on');
  if(action==='savePermissions') toast('حُفظت إعدادات المشاركة');
  if(action==='exportReport') toast('التقارير المتقدمة قيد التطوير');
  if(action==='reminder') toast('التذكيرات قيد التطوير');

  /* أزرار كانت معطّلة (لا معالج) — اكتشفها فحص السلامة */
  if(action==='statusPlan'){
    navigate('decision','جارٍ فتح محرك القرار...');
  }
  if(action==='editFamily'){
    navigate('settings','جارٍ فتح الإعدادات...');
    toast('عدّل ملفك المالي من هنا');
  }
}

/* ───────────────────────────────────────────────────────────────────────
 * نموذج العملية (دخل / مصروف)
 * ─────────────────────────────────────────────────────────────────── */

function txForm(o){
  const isEdit = !!o.id;
  const kind   = o.kind || 'expense';
  const bal    = QararStore.getBalance();
  return `
    <h3>${isEdit ? 'تعديل العملية' : 'عملية جديدة'}</h3>
    <p class="demo-note">بيئة تجريبية — لا توجد بيانات مصرفية حقيقية.</p>

    <div class="field">
      <label>نوع العملية</label>
      <div class="type-toggle">
        <button type="button" class="type-opt income ${kind==='income'?'active':''}"
                data-action="setTxType" data-type="income">
          <b>＋ دخل</b><small>يزيد الرصيد</small>
        </button>
        <button type="button" class="type-opt expense ${kind==='expense'?'active':''}"
                data-action="setTxType" data-type="expense">
          <b>− مصروف</b><small>ينقص الرصيد</small>
        </button>
      </div>
    </div>

    <div class="form-grid">
      <div class="field"><label>العنوان</label>
        <input id="txTitle" value="${esc(o.title||'')}" placeholder="مثال: بقالة"/></div>
      <div class="field"><label>التاجر / المصدر</label>
        <input id="txMerchant" value="${esc(o.merchant||'')}" placeholder="مثال: Panda"/></div>
      <div class="field"><label>المبلغ (ريال)</label>
        <input id="txAmount" type="number" step="0.01" value="${o.amount||''}" placeholder="مثال: 200"/>
        <small class="hint">اكتب رقمًا موجبًا. النوع أعلاه يحدد الإشارة.</small></div>
      <div class="field"><label>التاريخ</label>
        <input id="txDate" type="date" value="${o.date||QararStore.getProfile().asOfDate}"/></div>
      <div class="field"><label>التصنيف</label>
        <select id="txCategory">
          ${QararDemo.CATEGORIES.map(c=>
            `<option ${o.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="field"><label>ملاحظات (اختياري)</label>
        <input id="txNotes" value="${esc(o.notes||'')}"/></div>
    </div>

    <input type="hidden" id="txType" value="${kind}"/>
    <input type="hidden" id="txId" value="${o.id||''}"/>

    <div class="bal-preview">
      <span>الرصيد قبل: <b>${riyal(bal)}</b></span>
      <span id="balAfter" class="bal-after"></span>
    </div>

    <div id="txError" class="tx-error"></div>
    <button class="btn primary" data-action="saveTx" id="saveTxBtn">
      ${isEdit ? 'حفظ التعديل' : 'حفظ العملية'}
    </button>`;
}

/** تحديث معاينة الرصيد بعد العملية */
function updateBalPreview(){
  const amt  = Number($('#txAmount')?.value || 0);
  const type = $('#txType')?.value || 'expense';
  const el   = $('#balAfter');
  const errEl= $('#txError');
  if(!el) return;

  if(errEl) errEl.textContent = '';

  if(!amt || amt<=0){ el.textContent=''; return; }

  const editId = $('#txId')?.value;
  let bal = QararStore.getBalance();
  /* لو تعديل: نلغِ أثر العملية القديمة أولًا */
  if(editId){
    const old = QararStore.getTransaction(editId);
    if(old) bal += (old.type==='income' ? -old.amountMinor : old.amountMinor);
  }
  const delta = Money.fromRiyal(amt);
  const after = type==='income' ? bal + delta : bal - delta;

  el.innerHTML = `الرصيد بعد: <b class="${after<0?'neg':''}">${riyal(after)}</b>`;
}

/** حفظ العملية مع Validation واضح */
function saveTransactionFromForm(){
  const btn = $('#saveTxBtn');
  const errEl = $('#txError');
  const title = $('#txTitle')?.value?.trim();
  const raw   = $('#txAmount')?.value?.trim();
  const type  = $('#txType')?.value;
  const editId= $('#txId')?.value;

  const showErr = (m)=>{ if(errEl) errEl.textContent = m; else toast(m); };

  if(!title){ showErr('أدخل عنوان العملية'); return; }
  if(!raw){   showErr('أدخل المبلغ'); return; }

  const num = Number(raw);
  if(!isFinite(num) || num===0){ showErr('أدخل مبلغًا صحيحًا'); return; }

  /* 🔴 تعارض الإشارة مع النوع — لا نسمح بتعارض صامت */
  const wroteNegative = raw.startsWith('-') || num < 0;
  const wrotePositive = raw.startsWith('+');

  if(wroteNegative && type==='income'){
    showErr('اخترت «دخل» لكن كتبت مبلغًا سالبًا. غيّر النوع إلى «مصروف» أو اكتب رقمًا موجبًا.');
    return;
  }
  if(wrotePositive && type==='expense'){
    showErr('اخترت «مصروف» لكن كتبت علامة (+). غيّر النوع إلى «دخل» أو احذف العلامة.');
    return;
  }

  const amountMinor = Money.fromRiyal(Math.abs(num));

  /* منع الضغط المزدوج */
  if(btn){ btn.disabled = true; btn.textContent = 'جارٍ الحفظ...'; }

  try{
    const payload = {
      type, amountMinor, title,
      merchantOrSource: $('#txMerchant')?.value?.trim() || title,
      category:  $('#txCategory')?.value,
      transactionDate: $('#txDate')?.value || QararStore.getProfile().asOfDate,
      notes:     $('#txNotes')?.value?.trim() || '',
      source:    'sandbox'
    };

    if(editId){
      QararStore.updateTransaction(editId, payload);
      closeSheet();
      toast('حُدّثت العملية — أُعيد الحساب ✓');
    }else{
      QararStore.addTransaction(payload);
      closeSheet();
      toast(type==='income' ? 'أُضيف الدخل — زاد الرصيد ✓' : 'أُضيف المصروف — نقص الرصيد ✓');
    }
  }catch(e){
    if(btn){ btn.disabled = false; btn.textContent = 'حفظ العملية'; }
    if(e.message==='DUPLICATE_SUBMIT'){
      showErr('هذه العملية أُضيفت للتو. تجنّب الضغط مرتين.');
    }else{
      showErr('تعذر الحفظ: ' + e.message);
    }
  }
}

document.addEventListener('click', e => {
  const goto = e.target.closest('[data-goto]');
  if(goto) return navigate(goto.dataset.goto, goto.dataset.load);
  const action = e.target.closest('[data-action]');
  if(action) return handleAction(action.dataset.action, action);
  const ask = e.target.closest('[data-ask]');
  if(ask) return sendChat(ask.dataset.ask);
});
document.addEventListener('change', e=>{
  if(e.target?.id === 'decisionPayMode'){
    const mf = document.getElementById('monthsField');
    if(mf) mf.style.display = e.target.value === 'installment' ? 'grid' : 'none';
  }
  if(e.target?.id === 'txAmount' || e.target?.id === 'txType'){
    updateBalPreview();
  }
});

/* معاينة حيّة للرصيد أثناء الكتابة */
document.addEventListener('input', e=>{
  if(e.target?.id === 'txAmount') updateBalPreview();
});

/* مبدّل نوع العملية (دخل / مصروف) */
document.addEventListener('click', e=>{
  const opt = e.target.closest('[data-action="setTxType"]');
  if(!opt) return;
  e.preventDefault();
  const type = opt.dataset.type;
  const hidden = document.getElementById('txType');
  if(hidden) hidden.value = type;
  document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('active'));
  opt.classList.add('active');
  updateBalPreview();
});

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.activeElement?.id==='chatText') sendChat();
  if(e.key==='Escape') closeSheet();
});

/* (٤) تشخيص ذاتي — يُطبع في Console للتحقق السريع */
(function selfCheck(){
  var required = ['startExperience','enterAppSafely','navigate','handleAction',
                  'runDecisionAnalysis','sendChat'];
  var missing  = required.filter(function(fn){ return typeof window[fn] !== 'function'; });

  var splashUp  = false, loadingUp = false;
  try{
    var s = document.getElementById('splash');
    var l = document.getElementById('loading');
    splashUp  = !!s && !s.classList.contains('hide');
    loadingUp = !!l && !l.classList.contains('hide');
  }catch(e){}

  if(missing.length){
    console.error('[Qarar] 🔴 دوال حرجة مفقودة:', missing);
  }
  if(loadingUp){
    console.error('[Qarar] 🔴 شاشة التحميل ظاهرة عند البدء — تصحيح قسري.');
    try{
      var l2 = document.getElementById('loading');
      l2.classList.add('hide'); l2.style.display = 'none';
    }catch(e){}
  }

  console.log('[Qarar] ✓ جاهز | splash:', splashUp ? 'ظاهرة (طبيعي)' : 'مخفية',
              '| loading:', loadingUp ? '🔴 ظاهرة' : '✓ مخفية',
              '| دوال مفقودة:', missing.length);
})();
